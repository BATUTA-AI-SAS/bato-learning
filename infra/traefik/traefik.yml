## Reference Traefik config — used in production (module 08).
## Local dev uses the host ports exposed by docker-compose directly.

entryPoints:
  web:
    address: ":80"
    http:
      redirections:
        entryPoint:
          to: websecure
          scheme: https
  websecure:
    address: ":443"

certificatesResolvers:
  le:
    acme:
      email: REPLACE_ME@example.com
      storage: /letsencrypt/acme.json
      tlsChallenge: {}

providers:
  docker:
    exposedByDefault: false
    endpoint: unix:///var/run/docker.sock
