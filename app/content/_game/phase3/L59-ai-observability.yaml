slug: ai-observability
title: "Tu agente en producción: saber qué pasó en cada request"
kind: code
phase: PH03
ord: 59
trains_skill: ai-observability
concepts_introduced: [ai-traces, spans, cost-per-request, langsmith]
concepts_reinforced: [observability, llm-api, streaming]
xp: 20
est_seconds: 180
scenario_md: |
  El agente de ACME falla silenciosamente en 3% de requests. Sin trazas,
  no puedes reproducir el error. Instrumenta el agente para registrar
  tokens, latencia, costo y herramientas llamadas por request.
payload:
  starter: |
    import time
    from dataclasses import dataclass, field
    from anthropic import AsyncAnthropic

    client = AsyncAnthropic()

    @dataclass
    class AgentTrace:
        request_id: str
        question: str
        model: str = "claude-3-5-haiku-20241022"
        input_tokens: int = 0
        output_tokens: int = 0
        tools_called: list[str] = field(default_factory=list)
        latency_ms: float = 0.0
        cost_usd: float = 0.0
        error: str | None = None

    # Precios aproximados por 1M tokens (input/output)
    PRICING = {"claude-3-5-haiku-20241022": (0.80, 4.00)}

    async def traced_agent_call(question: str, request_id: str) -> AgentTrace:
        """Llama al agente y retorna un AgentTrace completo."""
        trace = AgentTrace(request_id=request_id, question=question)
        start = time.monotonic()
        try:
            # realiza la llamada y rellena trace.input_tokens, output_tokens, etc.
            ...
        except Exception as e:
            trace.error = str(e)
        finally:
            trace.latency_ms = (time.monotonic() - start) * 1000
        return trace
  tests: |
    import asyncio
    trace = asyncio.run(traced_agent_call("¿Total de facturas de ACME?", "req-001"))
    assert trace.request_id == "req-001"
    assert trace.latency_ms > 0
    assert trace.input_tokens > 0
    assert trace.cost_usd >= 0
hint_md: |
  Los tokens están en `response.usage.input_tokens` y `output_tokens`.
  El costo = `(input * price_in + output * price_out) / 1_000_000`.
  En producción exportas estas trazas a LangSmith, Phoenix o una tabla SQL.
solution_md: |
  Observabilidad IA = logs + métricas + trazas, igual que software clásico.
  Añades: costo por request, tokens por modelo, herramientas llamadas.
  Sin esto, el CFO de ACME solo ve la factura de Anthropic al mes — no qué
  query costó $5 ese martes.
