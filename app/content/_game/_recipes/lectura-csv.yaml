slug: lectura-csv
title: "Receta: Lectura de CSV"
chapter_ref: phase1
ingredients: [archivo, lista, diccionario, error-excepcion]
body_md: |
  El módulo csv de la biblioteca estándar convierte cada fila en un diccionario usando los
  encabezados como claves. Es la forma más directa de procesar exportaciones de Excel o ERP
  sin dependencias externas.
yields_md: |
  ```python
  import csv
  from pathlib import Path

  def leer_facturas(ruta: str) -> list[dict]:
      with open(ruta, newline="", encoding="utf-8") as f:
          return list(csv.DictReader(f))
  ```
