slug: htmx-dashboard
title: "Actualiza el dashboard sin recargar la página"
kind: fill_blank
trains_skill: htmx
concepts_introduced: [HTMX, hx-get, hx-swap, progressive-enhancement]
concepts_reinforced: [HTML, API]
scenario_md: |
  El Director de TI de ACME quiere un botón que actualice la tabla de
  facturas sin recargar toda la página. Con HTMX solo necesitas dos
  atributos HTML. Completa el botón y el div receptor correctamente.
payload:
  code_template: |
    <button ___="/api/facturas" ___="#tabla">
      Actualizar facturas
    </button>
    <div id="tabla">
      <!-- aquí llega el HTML de la respuesta -->
    </div>
  blanks:
    - label: "atributo HTMX que dispara un GET a la URL"
      correct: ["hx-get"]
    - label: "atributo HTMX que indica el selector CSS del elemento destino"
      correct: ["hx-target"]
hint_md: "hx-get dispara la petición. hx-target apunta al selector CSS donde se inserta la respuesta."
solution_md: |
  hx-get="/api/facturas" hace la petición GET al endpoint.
  hx-target="#tabla" dice a HTMX que inserte la respuesta dentro del
  elemento con id="tabla". Por defecto usa innerHTML como método de swap.
xp: 15
est_seconds: 90
