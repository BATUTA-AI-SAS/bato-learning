- slug: chunking_with_overlap
  title: "Implementa chunking por tokens con overlap"
  runner: pyodide
  kind: code
  prompt: |
    Implementa `chunk_text(text, chunk_size, overlap)` que divide un texto
    en chunks de aproximadamente `chunk_size` **palabras** (usamos palabras como
    proxy de tokens para no necesitar tokenizador externo), con `overlap` palabras
    de solapamiento entre chunks consecutivos.

    El último chunk puede ser más pequeño si el texto no es divisible exactamente.

    Ejemplo con `chunk_size=5, overlap=2`:
    - Texto: `"A B C D E F G H I J"`  (10 palabras)
    - Chunks: `["A B C D E", "D E F G H", "G H I J"]`

    Guarda los resultados de las pruebas en `chunks_small` y `chunks_overlap`.
  hint: |
    Divide el texto en palabras con `.split()`. Luego itera con paso `chunk_size - overlap`.
    Cada chunk es `words[i : i + chunk_size]` unido con espacios.
  starter: |
    def chunk_text(text: str, chunk_size: int, overlap: int) -> list[str]:
        # implementa aquí
        pass

    # prueba 1: sin overlap
    texto_acme = "La revalorización de activos fijos se rige por NIIF 16 según el manual contable aprobado en 2025"
    chunks_small = chunk_text(texto_acme, chunk_size=5, overlap=0)

    # prueba 2: con overlap
    chunks_overlap = chunk_text(texto_acme, chunk_size=5, overlap=2)

    print("sin overlap:", chunks_small)
    print("con overlap:", chunks_overlap)
  test: |
    words = texto_acme.split()

    # sin overlap: chunks de 5 palabras, sin repetición
    assert len(chunks_small) == (len(words) + 4) // 5, (
        f"sin overlap: esperaba {(len(words) + 4) // 5} chunks, obtuve {len(chunks_small)}"
    )
    # verificar que no hay palabras repetidas entre chunks consecutivos
    for i in range(len(chunks_small) - 1):
        last_word = chunks_small[i].split()[-1]
        first_word_next = chunks_small[i+1].split()[0]
        # sin overlap, la última palabra del chunk i no debe ser la primera del i+1
        # (a menos que sea el patrón exacto)

    # con overlap: los últimos `overlap` tokens del chunk i aparecen al inicio del chunk i+1
    for i in range(len(chunks_overlap) - 1):
        words_current = chunks_overlap[i].split()
        words_next    = chunks_overlap[i + 1].split()
        overlap_actual = 2
        if len(words_current) >= overlap_actual:
            tail = words_current[-overlap_actual:]
            head = words_next[:overlap_actual]
            assert tail == head, (
                f"overlap incorrecto entre chunk {i} y {i+1}: "
                f"tail={tail}, head={head}"
            )

    # el texto completo se puede reconstruir (sin overlap)
    all_words = " ".join(chunks_small).split()
    assert all_words == words, "todos los tokens del texto deben aparecer en los chunks"
    print("ok")
  solution: |
    def chunk_text(text, chunk_size, overlap):
        words = text.split()
        chunks = []
        step = chunk_size - overlap
        for i in range(0, len(words), step):
            chunk = words[i : i + chunk_size]
            if chunk:
                chunks.append(" ".join(chunk))
        return chunks

- slug: rag_pipeline_simulation
  title: "Pipeline RAG completo con vectores sintéticos"
  runner: pyodide
  kind: code
  prompt: |
    Implementa un pipeline RAG mínimo con vectores sintéticos (sin APIs externas).
    El pipeline tiene 4 funciones que debes completar:

    1. `retrieve(query_vec, corpus, tenant_id, top_k)`:
       - Filtra por `tenant_id`.
       - Calcula similitud coseno.
       - Retorna los `top_k` más similares como lista de dicts `{text, metadata, similarity}`.

    2. `rerank(question, chunks)`:
       - Simula un reranker multiplicando la similitud por un «boost» si la question
         contiene alguna palabra del chunk (case-insensitive). Boost = 1.2 si hay match,
         1.0 si no.
       - Ordena por `rerank_score` descendente y retorna los mismos dicts con
         el campo `rerank_score` añadido.

    3. `build_context(chunks)`:
       - Retorna un string con los chunks numerados:
         `"[1] §section p.page: texto\n\n[2] ..."`

    4. `rag_pipeline(question, query_vec, corpus, tenant_id)`:
       - Llama retrieve (top_k=4), rerank (top_n=2), build_context.
       - Retorna `{"context": str, "chunks_used": int}`.

    Usa el corpus y la query de prueba incluidos.
  hint: |
    Para el rerank simulado: `boost = 1.2 if any(w in chunk["text"].lower() for w in question.lower().split()) else 1.0`
    `rerank_score = chunk["similarity"] * boost`
