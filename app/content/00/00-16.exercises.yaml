- slug: math-basics
  title: "Usar el módulo math"
  runner: pyodide
  kind: code
  prompt: |
    ACME calcula penalidades por facturas vencidas usando la raíz cuadrada
    del monto como base de cálculo (simplificación de ejemplo).

    Importa `math` y escribe la función `penalty(amount)` que devuelve
    `math.sqrt(amount)` redondeado a 2 decimales con `round(..., 2)`.

    Prueba con `penalty(4820.50)` y `penalty(1500.0)`.
  hint: |
    `import math` al inicio. Dentro de la función, `return round(math.sqrt(amount), 2)`.
  starter: |
    # importa math aquí


    def penalty(amount: float) -> float:
        # completa: devuelve sqrt(amount) redondeado a 2 decimales
        pass


    print(penalty(4820.50))
    print(penalty(1500.0))
  test: |
    import math
    assert penalty(4820.50) == round(math.sqrt(4820.50), 2), "resultado incorrecto para 4820.50"
    assert penalty(1500.0) == round(math.sqrt(1500.0), 2), "resultado incorrecto para 1500.0"
    assert penalty(0.0) == 0.0, "sqrt(0) debe ser 0.0"
    print("ok")
  solution: |
    import math


    def penalty(amount: float) -> float:
        return round(math.sqrt(amount), 2)


    print(penalty(4820.50))
    print(penalty(1500.0))

- slug: random-invoice-generator
  title: "Generar facturas con random"
  runner: pyodide
  kind: code
  prompt: |
    Escribe una función `generate_invoices(n)` que devuelva una lista de `n`
    diccionarios. Cada diccionario representa una factura con estas claves:
    - `"id"`: string con formato `"INV-001"`, `"INV-002"`, etc.
    - `"vendor"`: elige aleatoriamente entre `["ACME", "Globex", "Initech"]`.
    - `"amount"`: float aleatorio entre `100.0` y `5000.0`, redondeado a 2 decimales.

    Usa `import random`. Llama `generate_invoices(3)` e imprime cada factura.
  hint: |
    `random.choice(lista)` elige un elemento. `random.uniform(a, b)` genera un float.
    `round(x, 2)` redondea a 2 decimales. El id puedes formatearlo con f-string: `f"INV-{i:03d}"`.
  starter: |
    import random


    def generate_invoices(n: int) -> list[dict]:
        vendors = ["ACME", "Globex", "Initech"]
        invoices = []
        for i in range(1, n + 1):
            # completa: crea el dict y añádelo a invoices
            pass
        return invoices


    for inv in generate_invoices(3):
        print(inv)
  test: |
    result = generate_invoices(5)
    assert len(result) == 5, f"esperaba 5 facturas, obtuve {len(result)}"
    for inv in result:
        assert "id" in inv, "falta clave 'id'"
        assert "vendor" in inv, "falta clave 'vendor'"
        assert "amount" in inv, "falta clave 'amount'"
        assert inv["vendor"] in ["ACME", "Globex", "Initech"], f"vendor inválido: {inv['vendor']}"
        assert 100.0 <= inv["amount"] <= 5000.0, f"amount fuera de rango: {inv['amount']}"
    # verificar formato de id
    ids = [inv["id"] for inv in result]
    assert ids[0] == "INV-001", f"primer id debe ser INV-001, obtuve {ids[0]}"
    assert ids[4] == "INV-005", f"quinto id debe ser INV-005, obtuve {ids[4]}"
    print("ok")
  solution: |
    import random


    def generate_invoices(n: int) -> list[dict]:
        vendors = ["ACME", "Globex", "Initech"]
        invoices = []
        for i in range(1, n + 1):
            invoices.append({
                "id": f"INV-{i:03d}",
                "vendor": random.choice(vendors),
                "amount": round(random.uniform(100.0, 5000.0), 2),
            })
        return invoices


    for inv in generate_invoices(3):
        print(inv)
