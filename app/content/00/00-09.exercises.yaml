- slug: first-script-print
  title: "Tu primer script: imprimir variables"
  runner: pyodide
  kind: code
  prompt: |
    Escribe el cuerpo de un script de auditoría mínimo para ACME Manufacturing.

    El script debe:
    1. Declarar `vendor = "ACME Manufacturing"`, `period = "2026-04"`, `invoice_count = 3`.
    2. Declarar `total_amount = 14890.50` (suma de las tres facturas).
    3. Calcular `average_amount` como el total dividido entre el número de facturas.
    4. Imprimir exactamente estas dos líneas (con los valores calculados):
       - `"Auditoría ACME Manufacturing — 2026-04"`
       - `"3 facturas | total: 14890.50 EUR | promedio: 4963.50 EUR"`

    Los números en la segunda línea deben tener exactamente 2 decimales.
  hint: |
    Usa f-strings con `:.2f` para formatear los floats.
    `average_amount = total_amount / invoice_count`.
  starter: |
    vendor = "ACME Manufacturing"
    period = "2026-04"
    invoice_count = 3
    total_amount = 14890.50

    average_amount = ...

    print(f"Auditoría {vendor} — {period}")
    print(f"...")
  test: |
    assert abs(average_amount - 14890.50 / 3) < 1e-9, \
        f"average_amount debe ser {14890.50/3:.4f}, obtuve {average_amount}"
    lines = __cap.getvalue().strip().splitlines()
    assert len(lines) == 2, f"Deben imprimirse 2 líneas, imprimiste {len(lines)}"
    assert lines[0] == "Auditoría ACME Manufacturing — 2026-04", \
        f"Primera línea incorrecta: {lines[0]!r}"
    assert lines[1] == "3 facturas | total: 14890.50 EUR | promedio: 4963.50 EUR", \
        f"Segunda línea incorrecta: {lines[1]!r}"
    print("ok")
  solution: |
    vendor = "ACME Manufacturing"
    period = "2026-04"
    invoice_count = 3
    total_amount = 14890.50
    average_amount = total_amount / invoice_count
    print(f"Auditoría {vendor} — {period}")
    print(f"{invoice_count} facturas | total: {total_amount:.2f} EUR | promedio: {average_amount:.2f} EUR")

- slug: script-with-comments
  title: "Script comentado con lógica de negocio"
  runner: pyodide
  kind: code
  prompt: |
    El script siguiente calcula si una factura supera el umbral de revisión manual
    (facturas de más de 5000 EUR requieren aprobación adicional).

    Completa las partes marcadas con `...`:
    1. Calcula `requires_review` como `True` si `total` es mayor que `threshold`, `False` si no.
    2. Construye `status_label`: el string `"REVISIÓN MANUAL"` si `requires_review` es `True`,
       o `"APROBACIÓN AUTOMÁTICA"` si es `False`.
       Pista: en Python puedes asignar con una expresión condicional:
       `"A" if condicion else "B"`.
    3. Imprime la línea de reporte usando las variables.
  hint: |
    `requires_review = total > threshold` devuelve directamente `True` o `False`.
    Para el label: `status_label = "REVISIÓN MANUAL" if requires_review else "APROBACIÓN AUTOMÁTICA"`.
  starter: |
    # datos de la factura INV-007
    invoice_id = "INV-007"
    vendor = "Globex Logistics"
    base_amount = 6200.0
    tax_rate = 0.21

    # cálculos
    tax = base_amount * tax_rate
    total = base_amount + tax

    # umbral de revisión manual
    threshold = 5000.0

    # ¿requiere revisión?
    requires_review = ...

    # etiqueta de estado
    status_label = ...

    # imprimir resultado
    print(f"{invoice_id} | {vendor} | {total:.2f} EUR | {status_label}")
  test: |
    expected_total = 6200.0 * 1.21
    assert abs(total - expected_total) < 1e-9, f"total incorrecto: {total}"
    assert requires_review is True, "6200 * 1.21 > 5000, requires_review debe ser True"
    assert status_label == "REVISIÓN MANUAL", \
        f"status_label debe ser 'REVISIÓN MANUAL', obtuve {status_label!r}"
    out = __cap.getvalue().strip()
    assert "INV-007" in out, "La salida debe contener INV-007"
    assert "REVISIÓN MANUAL" in out, "La salida debe contener 'REVISIÓN MANUAL'"
    assert "7502.20" in out, "La salida debe contener el total 7502.20"
    print("ok")
  solution: |
    invoice_id = "INV-007"
    vendor = "Globex Logistics"
    base_amount = 6200.0
    tax_rate = 0.21
    tax = base_amount * tax_rate
    total = base_amount + tax
    threshold = 5000.0
    requires_review = total > threshold
    status_label = "REVISIÓN MANUAL" if requires_review else "APROBACIÓN AUTOMÁTICA"
    print(f"{invoice_id} | {vendor} | {total:.2f} EUR | {status_label}")

- slug: traceback-reading
  title: "Identificar el error en un script"
  runner: pyodide
  kind: code
  prompt: |
    El script siguiente tiene un error. Ejecútalo para ver el traceback,
    identifica el problema, y corrígelo para que imprima:
    `"Initech Audit | 2026-04 | total: 3450.75 EUR"`
  hint: |
    Lee el traceback de abajo hacia arriba: la última línea dice el tipo de error
    y el mensaje. Luego busca la línea del código que lo causó.
  starter: |
    vendor = "Initech Audit"
    period = "2026-04"
    amount = "3450.75"    # viene como string (de un CSV, por ejemplo)
    tax_rate = 0.0        # exento de IVA

    total = amount + tax_rate   # ← este es el problema

    print(f"{vendor} | {period} | total: {total:.2f} EUR")
  test: |
    assert abs(total - 3450.75) < 1e-9, \
        f"total debe ser 3450.75, obtuve {total}"
    out = __cap.getvalue().strip()
    assert out == "Initech Audit | 2026-04 | total: 3450.75 EUR", \
        f"Salida incorrecta: {out!r}"
    print("ok")
  solution: |
    vendor = "Initech Audit"
    period = "2026-04"
    amount = "3450.75"
    tax_rate = 0.0

    # convierte el string a float antes de operar
    total = float(amount) + tax_rate

    print(f"{vendor} | {period} | total: {total:.2f} EUR")
