    import os
    from typing import Annotated, Any, TypedDict
    from langchain_anthropic import ChatAnthropic
    from langchain_core.messages import AIMessage, HumanMessage, SystemMessage
    from langchain_core.tools import tool
    from langgraph.graph import END, START, StateGraph
    from langgraph.graph.message import add_messages
    from langgraph.prebuilt import ToolNode, tools_condition

    COMPACTION_THRESHOLD = 1000

    @tool
    def sql_query(query: str, tenant: str) -> str:
        """Ejecuta una query SQL de solo-lectura sobre el warehouse del tenant."""
        return f"[{tenant}] 12 facturas, total 48 210,00 EUR"

    class State(TypedDict):
        messages: Annotated[list, add_messages]

    def compaction_check(state: State) -> dict[str, Any]:
        total_chars = 0
        for m in state["messages"]:
            if isinstance(m.content, str):
                total_chars += len(m.content)
            elif isinstance(m.content, list):
                total_chars += sum(
                    len(p.get("text", ""))
                    for p in m.content
                    if isinstance(p, dict)
                )
        estimated_tokens = total_chars // 4
        if estimated_tokens < COMPACTION_THRESHOLD:
            return {}
        resumen = SystemMessage(
            content=f"[COMPACTADO] Historial resumido: {len(state['messages'])} mensajes."
        )
        # Reemplaza el historial: solo el resumen + últimos 2 mensajes
        return {"messages": [resumen] + state["messages"][-2:]}

    llm = ChatAnthropic(
        model="claude-sonnet-4-6",
        api_key=os.environ["ANTHROPIC_API_KEY"],
    ).bind_tools([sql_query])

    def model_node(state: State) -> dict[str, Any]:
        return {"messages": [llm.invoke(state["messages"])]}

    g = StateGraph(State)
    g.add_node("compaction_check", compaction_check)
    g.add_node("model", model_node)
    g.add_node("tools", ToolNode([sql_query]))
    g.add_edge(START, "compaction_check")
    g.add_edge("compaction_check", "model")
    g.add_conditional_edges("model", tools_condition)
    g.add_edge("tools", "model")
    app = g.compile()

    # Pre-cargar historial largo (> 1000 tokens estimados)
    long_history = []
    for i in range(10):
        long_history.append(HumanMessage(content=f"Mensaje largo {i}: " + "x" * 500))
        long_history.append(AIMessage(content=f"Respuesta {i}: " + "y" * 500))

    state_compacted = app.invoke(
        {"messages": long_history + [HumanMessage("¿Cuántas facturas?")]},
    )
