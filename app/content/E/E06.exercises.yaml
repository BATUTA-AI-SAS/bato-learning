# E06 — Ejercicio de diagnóstico backend
# El Capstone completo ES el ejercicio principal. Este YAML contiene un
# único ejercicio de diagnóstico: dado un repo portado, verifica con queries
# que cumple los 6 criterios de aceptación duros.
# runner: backend — requiere la app corriendo con datos de prueba.

- slug: e06_capstone_diagnosis
  title: "Diagnóstico: verificar los 6 criterios de aceptación del Capstone"
  runner: backend
  kind: integration
  prompt: |
    Tienes acceso a una instancia de la app con el Capstone parcialmente implementado.
    Escribe la función `check_capstone_criteria(db_path: str, temporal_client) -> dict`
    que retorna un dict con la forma:

    ```python
    {
        "multitenant_isolated": bool,    # criterio 1
        "golden_set_passes": bool,       # criterio 2
        "phoenix_traces_exist": bool,    # criterio 3
        "backup_restores_clean": bool,   # criterio 4
        "workflow_cancellable": bool,    # criterio 5
        "tls_valid": bool,               # criterio 6
        "ready": bool,                   # True si y solo si los 6 son True
    }
    ```

    Para el criterio 1 (`multitenant_isolated`):
    - Consulta la tabla `audit_runs` de `db_path`.
    - Verifica que existen filas con `tenant_id = "acme"` Y filas con `tenant_id = "globex"`.
    - Verifica que ninguna fila tiene `tenant_id = NULL` o `tenant_id = ""`.

    Para el criterio 2 (`golden_set_passes`):
    - Lee los archivos JSON en `tests/fixtures/golden/`.
    - Para cada fixture, verifica que existe un `audit_run` en DB con `tenant_id` y `period` del fixture
      y que `finding_count >= expected["finding_count_min"]`.

    Para los criterios 3–6, la función recibe `temporal_client` y puede hacer
    `await temporal_client.describe_workflow(workflow_id)` para el criterio 5.
    Los criterios 3, 4 y 6 se verifican con checks simples (ver hints).

    La implementación real de criterios 3 y 6 puede ser un stub que devuelve `True`
    si las condiciones del entorno no están disponibles en el test — lo que importa
    es que la función tiene la firma correcta y que criterios 1 y 2 son verificaciones
    reales contra datos de DB.
  hint: |
    - Criterio 1: usa `sqlite3.connect(db_path)` y `SELECT DISTINCT tenant_id FROM audit_runs`.
    - Criterio 2: `json.loads(Path(fixture_path).read_text())` para cada fixture.
    - Criterio 5: `handle = temporal_client.get_workflow_handle("audit-acme-2026-04")`;
      `desc = await handle.describe()`; `desc.status == WorkflowExecutionStatus.CANCELLED`.
    - Criterio 6: `httpx.get("https://tudominio.com/api/health").status_code == 200` — en test
      puede ser un stub que devuelve True.
    - `ready`: `all(v for k, v in result.items() if k != "ready")`.
