<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>bato-learning</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700;900&family=Fira+Code:wght@400;600&family=Source+Sans+3:wght@300;400;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/pyodide/v0.27.0/full/pyodide.js" async></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --void:#05060a;--deep:#0b0c14;--surface:rgba(12,13,22,.88);--glass:rgba(16,17,28,.72);
  --glass-h:rgba(22,24,40,.85);--glass-b:1px solid rgba(180,160,100,.12);
  --gold:#c9a84c;--gold-b:#e8c44a;--gold-d:#7a6228;--gold-g:rgba(200,168,76,.25);
  --ember:#d4874a;--ember-g:rgba(212,135,74,.3);
  --jade:#3daa6d;--jade-d:#266e44;--jade-g:rgba(61,170,109,.25);
  --ruby:#c04040;--ruby-g:rgba(192,64,64,.2);
  --azure:#4488cc;--azure-g:rgba(68,136,204,.25);
  --cream:#ede4d0;--cream-d:#a89878;--dim:#585040;--lock:#3a3a48;
  --r-sm:6px;--r-md:12px;--r-lg:18px;
  --ff-title:'Cinzel',Georgia,serif;--ff-body:'Source Sans 3',system-ui,sans-serif;--ff-code:'Fira Code',monospace;
  --ease:cubic-bezier(.16,1,.3,1);
}
html,body{height:100%;overflow:hidden;background:var(--void);color:var(--cream);font-family:var(--ff-body);-webkit-font-smoothing:antialiased}
body::before{content:'';position:fixed;inset:0;z-index:0;opacity:.025;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.8' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");pointer-events:none}
body::after{content:'';position:fixed;inset:0;z-index:0;background:radial-gradient(ellipse 70% 60% at 50% 40%,transparent,var(--void));pointer-events:none}

/* === HUD === */
.hud{position:fixed;top:0;left:0;right:0;height:52px;z-index:200;display:flex;align-items:center;gap:12px;padding:0 14px;background:linear-gradient(180deg,rgba(5,6,10,.96),rgba(5,6,10,.75));border-bottom:1px solid rgba(180,160,100,.08);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px)}
.hud-avatar{width:32px;height:32px;border-radius:50%;background:linear-gradient(135deg,var(--gold),var(--gold-d));display:flex;align-items:center;justify-content:center;font:700 13px var(--ff-title);color:var(--void);flex-shrink:0;box-shadow:0 0 0 2px var(--void),0 0 0 3px var(--gold-d)}
.hud-name{font:600 14px var(--ff-title);color:var(--cream);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.hud-xp{display:flex;align-items:center;gap:8px;margin-left:auto}
.xp-bar{width:120px;height:6px;background:rgba(200,168,76,.1);border-radius:3px;overflow:hidden}
.xp-fill{height:100%;border-radius:3px;background:linear-gradient(90deg,var(--gold-d),var(--gold-b));transition:width .8s var(--ease)}
.xp-num{font:700 12px var(--ff-code);color:var(--gold-b);white-space:nowrap}

/* === MAIN === */
.app{position:relative;z-index:1;height:100%;padding-top:52px;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch}

/* === MAP VIEW === */
.map-view{padding:24px 16px 40px;max-width:600px;margin:0 auto;display:flex;flex-direction:column;align-items:center}
.map-heading{font:700 11px var(--ff-title);color:var(--dim);letter-spacing:.25em;text-transform:uppercase;margin-bottom:20px}
.map-path{position:relative;display:flex;flex-direction:column;gap:0;width:100%;max-width:380px}
.map-connector{width:2px;height:28px;background:linear-gradient(180deg,var(--gold-d),rgba(200,168,76,.15));margin:0 auto;transition:background .3s}
.map-connector.locked{background:linear-gradient(180deg,var(--lock),rgba(58,58,72,.1))}
.map-node{display:flex;align-items:center;gap:14px;padding:14px 16px;border-radius:var(--r-md);border:1px solid rgba(180,160,100,.1);background:var(--glass);cursor:pointer;transition:all .3s var(--ease);position:relative}
.map-node:hover{background:var(--glass-h);border-color:rgba(180,160,100,.25);transform:translateX(4px)}
.map-node.active{border-color:var(--gold);box-shadow:0 0 20px var(--gold-g),inset 0 0 20px rgba(200,168,76,.05);animation:activePulse 3s ease-in-out infinite}
.map-node.complete{border-color:var(--jade-d);background:rgba(61,170,109,.06)}
.map-node.locked{opacity:.4;cursor:not-allowed;pointer-events:none}
.map-icon{width:44px;height:44px;border-radius:var(--r-sm);display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0}
.map-info{flex:1;min-width:0}
.map-info h3{font:700 15px var(--ff-title);color:var(--cream);margin-bottom:2px}
.map-info p{font-size:12px;color:var(--cream-d)}
.map-pct{font:700 12px var(--ff-code);color:var(--gold)}
.map-bar{width:100%;height:4px;background:rgba(255,255,255,.06);border-radius:2px;margin-top:4px;overflow:hidden}
.map-bar-fill{height:100%;border-radius:2px;transition:width .6s var(--ease)}
.map-lock{position:absolute;top:8px;right:12px;font-size:14px;color:var(--lock)}
@keyframes activePulse{0%,100%{box-shadow:0 0 16px var(--gold-g)}50%{box-shadow:0 0 30px var(--gold-g),0 0 60px rgba(200,168,76,.08)}}

/* === ROOM VIEW === */
.room-view{display:none;padding:0 0 40px}
.room-view.active{display:block}
.room-header{display:flex;align-items:center;gap:12px;padding:12px 16px;border-bottom:1px solid rgba(180,160,100,.08);background:rgba(5,6,10,.6);backdrop-filter:blur(8px);position:sticky;top:0;z-index:50}
.room-back{background:none;border:none;color:var(--cream-d);font:600 13px var(--ff-body);cursor:pointer;display:flex;align-items:center;gap:6px;padding:6px 10px;border-radius:var(--r-sm);transition:all .2s}
.room-back:hover{background:rgba(255,255,255,.06);color:var(--cream)}
.room-title{font:700 16px var(--ff-title);color:var(--cream);flex:1}
.room-pct{font:700 13px var(--ff-code);color:var(--gold)}

/* Room scene */
.room-scene{position:relative;width:100%;max-width:680px;margin:20px auto 0;aspect-ratio:5/3;border-radius:var(--r-lg);overflow:hidden;border:1px solid rgba(180,160,100,.08)}
.room-floor{position:absolute;inset:0;opacity:.15}
.room-grid{position:absolute;inset:0;display:grid;grid-template-columns:repeat(4,1fr);grid-template-rows:repeat(3,1fr);gap:8px;padding:12px}
.room-obj{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;border-radius:var(--r-md);border:1px solid transparent;background:rgba(0,0,0,.2);cursor:pointer;transition:all .3s var(--ease);position:relative;padding:8px 4px}
.room-obj:hover{transform:scale(1.06);background:rgba(0,0,0,.35)}
.room-obj.active{border-color:var(--gold);box-shadow:0 0 18px var(--gold-g);animation:objPulse 2.5s ease-in-out infinite}
.room-obj.complete{border-color:var(--jade-d);background:rgba(61,170,109,.08)}
.room-obj.locked{opacity:.35;cursor:not-allowed}
.room-obj.boss{border-color:var(--ruby);background:rgba(192,64,64,.06)}
.room-obj.boss.locked{border-color:transparent}
.room-obj.npc{border-color:var(--azure);background:rgba(68,136,204,.06)}
.room-obj.door{border-style:dashed}
.obj-icon{font-size:28px;line-height:1;filter:drop-shadow(0 2px 4px rgba(0,0,0,.4))}
.obj-label{font:600 10px var(--ff-body);color:var(--cream-d);text-align:center;line-height:1.2;max-width:100%;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.obj-progress{font:700 9px var(--ff-code);color:var(--gold)}
.obj-badge{position:absolute;top:-4px;right:-4px;width:20px;height:20px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;border:2px solid var(--void)}
.obj-badge.quest{background:var(--gold);color:var(--void)}
.obj-badge.done{background:var(--jade);color:#fff}
.obj-badge.lock{background:var(--lock);color:#888}
@keyframes objPulse{0%,100%{box-shadow:0 0 12px var(--gold-g)}50%{box-shadow:0 0 24px var(--gold-g),0 0 48px rgba(200,168,76,.06)}}

/* NPC panel */
.npc-strip{max-width:680px;margin:16px auto 0;padding:0 16px}
.npc-card{display:flex;align-items:center;gap:12px;padding:12px 16px;border-radius:var(--r-md);border:1px solid rgba(68,136,204,.15);background:rgba(68,136,204,.04);cursor:pointer;transition:all .2s}
.npc-card:hover{background:rgba(68,136,204,.08);border-color:rgba(68,136,204,.3)}
.npc-face{width:40px;height:40px;border-radius:50%;background:linear-gradient(135deg,var(--azure),#336699);display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
.npc-info{flex:1;min-width:0}
.npc-info h4{font:700 13px var(--ff-title);color:var(--cream);margin-bottom:2px}
.npc-info p{font:400 12px var(--ff-body);color:var(--cream-d);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.npc-chat-icon{font-size:18px;color:var(--azure);flex-shrink:0}

/* === DIALOGUE OVERLAY === */
.dialogue-overlay{display:none;position:fixed;bottom:0;left:0;right:0;z-index:300;padding:0 12px 16px}
.dialogue-overlay.active{display:block;animation:slideUp .25s var(--ease)}
.dialogue-box{max-width:640px;margin:0 auto;background:rgba(8,9,16,.96);border:1px solid var(--gold-d);border-radius:var(--r-md);padding:16px 20px;backdrop-filter:blur(20px);box-shadow:0 -8px 40px rgba(0,0,0,.5)}
.dialogue-speaker{font:700 11px var(--ff-title);color:var(--gold);letter-spacing:.06em;text-transform:uppercase;margin-bottom:6px}
.dialogue-text{font:400 14px var(--ff-body);color:var(--cream);line-height:1.65;min-height:36px}
.dialogue-text.typing::after{content:'▊';animation:blink .6s infinite;color:var(--gold)}
.dialogue-hint{font:400 11px var(--ff-body);color:var(--dim);margin-top:8px;text-align:right}
@keyframes slideUp{from{transform:translateY(100%);opacity:0}to{transform:translateY(0);opacity:1}}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}

/* === PUZZLE OVERLAY === */
.puzzle-overlay{display:none;position:fixed;inset:0;z-index:400;background:rgba(5,6,10,.92);backdrop-filter:blur(8px);overflow-y:auto;-webkit-overflow-scrolling:touch}
.puzzle-overlay.active{display:flex;flex-direction:column;animation:fadeIn .3s var(--ease)}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.puzzle-head{display:flex;align-items:center;gap:12px;padding:12px 16px;border-bottom:1px solid rgba(180,160,100,.08);background:rgba(5,6,10,.7);backdrop-filter:blur(12px);flex-shrink:0}
.puzzle-close{background:none;border:1px solid rgba(255,255,255,.1);color:var(--cream-d);width:34px;height:34px;border-radius:var(--r-sm);cursor:pointer;font-size:18px;display:flex;align-items:center;justify-content:center;transition:all .2s}
.puzzle-close:hover{background:rgba(255,255,255,.06);color:var(--cream);border-color:rgba(255,255,255,.2)}
.puzzle-title{font:700 15px var(--ff-title);color:var(--cream);flex:1}
.puzzle-xp{font:700 12px var(--ff-code);color:var(--gold);background:rgba(200,168,76,.1);padding:3px 10px;border-radius:var(--r-sm)}
.puzzle-body{flex:1;padding:20px 16px 40px;max-width:700px;margin:0 auto;width:100%}
.puzzle-scenario{font:400 14px var(--ff-body);color:var(--cream-d);line-height:1.7;margin-bottom:20px;padding:14px 16px;border-left:3px solid var(--gold-d);background:rgba(200,168,76,.04);border-radius:0 var(--r-sm) var(--r-sm) 0}
.puzzle-widget{background:var(--surface);border:1px solid rgba(180,160,100,.08);border-radius:var(--r-md);padding:20px}

/* Puzzle widgets */
.pw-instruction{font:600 12px var(--ff-body);color:var(--gold);text-transform:uppercase;letter-spacing:.05em;margin-bottom:14px}
.pw-list{list-style:none;display:flex;flex-direction:column;gap:8px}
.pw-step{display:flex;align-items:center;gap:10px;padding:10px 12px;background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.06);border-radius:var(--r-sm);cursor:grab;user-select:none;transition:all .15s;font:400 13px var(--ff-body);color:var(--cream)}
.pw-step:active{cursor:grabbing}
.pw-step.dragging{opacity:.5;transform:scale(.97)}
.pw-step.drag-over{border-color:var(--gold);background:rgba(200,168,76,.06)}
.pw-step-num{width:22px;height:22px;border-radius:50%;background:rgba(255,255,255,.06);display:flex;align-items:center;justify-content:center;font:700 10px var(--ff-code);color:var(--dim);flex-shrink:0}
.pw-step-handle{color:var(--dim);cursor:grab;flex-shrink:0}

.pw-choice{display:flex;align-items:flex-start;gap:12px;padding:12px 14px;background:rgba(255,255,255,.02);border:2px solid rgba(255,255,255,.06);border-radius:var(--r-sm);cursor:pointer;transition:all .2s;width:100%;text-align:left;color:var(--cream);font:400 13px var(--ff-body)}
.pw-choice:hover{border-color:rgba(255,255,255,.15);background:rgba(255,255,255,.04)}
.pw-choice.selected{border-color:var(--gold);background:rgba(200,168,76,.06)}
.pw-choice.correct{border-color:var(--jade)!important;background:rgba(61,170,109,.08)!important}
.pw-choice.wrong{border-color:var(--ruby)!important;background:rgba(192,64,64,.06)!important}
.pw-choice-letter{width:24px;height:24px;border-radius:4px;background:rgba(255,255,255,.06);display:flex;align-items:center;justify-content:center;font:700 11px var(--ff-code);color:var(--dim);flex-shrink:0}
.pw-choice.selected .pw-choice-letter{background:var(--gold);color:var(--void)}

.pw-code{background:rgba(0,0,0,.3);border:1px solid rgba(255,255,255,.06);border-radius:var(--r-sm);padding:14px 16px;font:400 13px/1.6 var(--ff-code);color:var(--cream-d);white-space:pre-wrap;overflow-x:auto;margin-bottom:14px}
.pw-input{width:100%;background:rgba(0,0,0,.3);border:1px solid rgba(255,255,255,.1);border-radius:var(--r-sm);color:var(--cream);font:400 13px var(--ff-code);padding:10px 12px;resize:vertical;outline:none;transition:border-color .2s}
.pw-input:focus{border-color:var(--gold)}
.pw-blank{display:inline-block;background:rgba(0,0,0,.4);border-bottom:2px solid var(--gold);color:var(--cream);font:400 13px var(--ff-code);padding:1px 6px;min-width:80px;outline:none;vertical-align:baseline;border-top:none;border-left:none;border-right:none}
.pw-blank:focus{border-bottom-color:var(--gold-b)}
.pw-blank.correct{border-bottom-color:var(--jade)}
.pw-blank.wrong{border-bottom-color:var(--ruby)}

.pw-tf-row{display:flex;gap:12px;margin-top:8px}
.pw-tf{flex:1;padding:16px;font:700 16px var(--ff-body);border-radius:var(--r-md);border:2px solid rgba(255,255,255,.08);background:rgba(255,255,255,.02);color:var(--cream);cursor:pointer;transition:all .2s}
.pw-tf:hover{background:rgba(255,255,255,.05)}
.pw-tf.selected{border-color:var(--gold);background:var(--gold-g);color:var(--gold)}
.pw-tf.correct{border-color:var(--jade)!important;background:var(--jade-g)!important;color:var(--jade)!important}
.pw-tf.wrong{border-color:var(--ruby)!important;background:var(--ruby-g)!important;color:var(--ruby)!important}

.pw-editor{width:100%;background:rgba(0,0,0,.35);color:var(--cream);font:400 13px/1.55 var(--ff-code);padding:14px;border:1px solid rgba(255,255,255,.08);border-radius:var(--r-sm);resize:vertical;min-height:140px;outline:none;tab-size:4}
.pw-editor:focus{border-color:var(--gold)}
.pw-output{margin-top:10px;background:rgba(0,0,0,.3);border-left:3px solid var(--azure);border-radius:var(--r-sm);padding:10px 14px;font:400 12px var(--ff-code);color:var(--cream-d);white-space:pre-wrap;display:none}
.pw-output.visible{display:block}
.pw-output.error{border-left-color:var(--ruby);color:var(--ruby)}

.btn-verify{display:inline-flex;align-items:center;gap:8px;margin-top:16px;padding:10px 24px;background:linear-gradient(135deg,var(--gold),var(--gold-b));color:var(--void);font:700 14px var(--ff-body);border:none;border-radius:var(--r-md);cursor:pointer;transition:all .2s}
.btn-verify:hover{opacity:.9;transform:translateY(-1px)}
.btn-verify:disabled{opacity:.35;cursor:not-allowed;transform:none}

.pw-feedback{margin-top:12px;padding:10px 14px;border-radius:var(--r-sm);font:400 13px var(--ff-body);display:none}
.pw-feedback.visible{display:block}
.pw-feedback.success{background:var(--jade-g);color:var(--jade);border-left:3px solid var(--jade)}
.pw-feedback.fail{background:var(--ruby-g);color:var(--ruby);border-left:3px solid var(--ruby)}

.pw-hint-btn{background:none;border:1px solid rgba(255,255,255,.08);color:var(--cream-d);font:400 12px var(--ff-body);padding:5px 12px;border-radius:var(--r-sm);cursor:pointer;margin-top:12px;transition:all .2s}
.pw-hint-btn:hover{color:var(--cream);border-color:var(--gold)}
.pw-hint{margin-top:8px;background:rgba(200,168,76,.04);border-left:3px solid var(--gold-d);padding:10px 14px;border-radius:0 var(--r-sm) var(--r-sm) 0;font:400 13px var(--ff-body);color:var(--cream-d);display:none}
.pw-hint.visible{display:block}

/* === CONCEPT POPUP === */
.concept-overlay{display:none;position:fixed;inset:0;z-index:500;background:rgba(0,0,0,.8);backdrop-filter:blur(6px);align-items:center;justify-content:center;padding:20px}
.concept-overlay.active{display:flex}
.concept-card{background:var(--surface);border:1px solid var(--gold-d);border-radius:var(--r-lg);padding:28px 24px;max-width:460px;width:100%;box-shadow:0 20px 60px rgba(0,0,0,.5);animation:conceptPop .3s var(--ease)}
.concept-tag{display:inline-block;font:700 10px var(--ff-title);color:var(--gold);background:var(--gold-g);border:1px solid rgba(200,168,76,.2);border-radius:99px;padding:3px 12px;letter-spacing:.08em;text-transform:uppercase;margin-bottom:12px}
.concept-card h2{font:700 20px var(--ff-title);color:var(--cream);margin-bottom:10px}
.concept-analogy{font:400 14px var(--ff-body);color:var(--cream-d);line-height:1.65;margin-bottom:14px}
.concept-example{background:rgba(0,0,0,.3);border-radius:var(--r-sm);padding:12px 14px;font:400 13px var(--ff-code);color:var(--cream-d);white-space:pre-wrap;margin-bottom:16px}
.concept-count{font:400 12px var(--ff-body);color:var(--dim);text-align:right;margin-bottom:12px}
@keyframes conceptPop{from{transform:scale(.92);opacity:0}to{transform:scale(1);opacity:1}}

/* === SUCCESS CELEBRATION === */
.success-overlay{display:none;position:fixed;inset:0;z-index:600;background:rgba(5,6,10,.9);backdrop-filter:blur(8px);align-items:center;justify-content:center;padding:20px}
.success-overlay.active{display:flex}
.success-card{text-align:center;animation:successPop .4s var(--ease)}
.success-xp{font:900 52px var(--ff-title);color:var(--gold-b);text-shadow:0 0 30px var(--gold-g);margin-bottom:8px}
.success-msg{font:400 16px var(--ff-body);color:var(--jade);margin-bottom:24px}
.success-btn{display:inline-flex;padding:12px 28px;background:linear-gradient(135deg,var(--jade),var(--jade-d));color:#fff;font:700 14px var(--ff-body);border:none;border-radius:var(--r-md);cursor:pointer;transition:all .2s}
.success-btn:hover{opacity:.9;transform:translateY(-1px)}
@keyframes successPop{from{transform:scale(.8);opacity:0}60%{transform:scale(1.05)}to{transform:scale(1);opacity:1}}

/* XP toast */
.xp-toast{position:fixed;top:60px;right:16px;z-index:700;padding:8px 16px;background:rgba(200,168,76,.15);border:1px solid var(--gold-d);border-radius:var(--r-sm);font:700 14px var(--ff-code);color:var(--gold-b);animation:toastIn .3s var(--ease),toastOut .3s .8s forwards;pointer-events:none}
@keyframes toastIn{from{transform:translateY(-20px);opacity:0}to{transform:translateY(0);opacity:1}}
@keyframes toastOut{to{transform:translateY(-10px);opacity:0}}

/* === MENTOR CHAT PANEL === */
.mentor-panel{display:none;position:fixed;bottom:0;right:0;width:340px;max-height:60vh;z-index:350;border-radius:var(--r-lg) var(--r-lg) 0 0;border:1px solid rgba(68,136,204,.15);background:var(--surface);backdrop-filter:blur(16px);flex-direction:column;overflow:hidden}
.mentor-panel.active{display:flex;animation:slideUp .3s var(--ease)}
.mentor-head{display:flex;align-items:center;gap:8px;padding:10px 14px;border-bottom:1px solid rgba(68,136,204,.1);font:700 12px var(--ff-title);color:var(--azure);text-transform:uppercase;letter-spacing:.04em}
.mentor-head .close-mentor{margin-left:auto;background:none;border:none;color:var(--cream-d);cursor:pointer;font-size:16px}
.mentor-msgs{flex:1;overflow-y:auto;padding:10px 12px;display:flex;flex-direction:column;gap:8px;min-height:120px;max-height:300px}

<script>window.__BL_GAME_STATE = {{ game_state_json | safe }};</script>
<script type="module">
import { ROOMS, ROOM_ORDER, getRoomBySlug } from '/static/js/rpg/rpg-rooms.js';

const GS = window.__BL_GAME_STATE;
const completedSlugs = new Set();
for (const r of Object.values(GS.rooms)) for (const s of (r.levels_passed||[])) completedSlugs.add(s);
let totalXp = GS.total_xp || 0;
let currentRoomSlug = null;

// Icons per room
const ROOM_ICONS = {'la-oficina':'🏢','el-taller':'⚙️','el-laboratorio':'🔬','la-ciudad':'🏙️'};
const OBJ_ICONS = {puzzle_cluster:'📋',boss:'⚔️',npc:'👤',door:'🚪'};
const ROOM_COLORS = {
  'la-oficina':{bg:'linear-gradient(135deg,#2a1f14,#1a1408)',accent:'#d4a054'},
  'el-taller':{bg:'linear-gradient(135deg,#141a1f,#0a1018)',accent:'#4488cc'},
  'el-laboratorio':{bg:'linear-gradient(135deg,#0f0f22,#0a0a18)',accent:'#8866cc'},
  'la-ciudad':{bg:'linear-gradient(135deg,#1a1416,#120e10)',accent:'#cc6644'}
};

// === HUD ===
function updateHud() {
  const n = GS.player_name || 'Jugador';
  document.getElementById('hud-avatar').textContent = n[0].toUpperCase();
  document.getElementById('hud-name').textContent = n;
  document.getElementById('xp-num').textContent = totalXp + ' XP';
  document.getElementById('xp-fill').style.width = Math.min(100, (totalXp % 100)) + '%';
}
updateHud();

// === MAP VIEW ===
function renderMap() {
  const path = document.getElementById('map-path');
  path.innerHTML = '';
  ROOM_ORDER.forEach((slug, i) => {
    const room = ROOMS[slug];
    const info = GS.rooms[slug] || {};
    const pct = info.percent || 0;
    const unlocked = info.unlocked;
    const isComplete = pct >= 100;
    const isActive = unlocked && !isComplete;

    if (i > 0) {
      const conn = document.createElement('div');
      conn.className = 'map-connector' + (unlocked ? '' : ' locked');
      path.appendChild(conn);
    }

    const node = document.createElement('div');
    node.className = 'map-node' + (isActive ? ' active' : isComplete ? ' complete' : !unlocked ? ' locked' : '');
    const colors = ROOM_COLORS[slug] || {};
    node.innerHTML = `
      <div class="map-icon" style="background:${colors.bg||'var(--glass)'}">${ROOM_ICONS[slug]||'📍'}</div>
      <div class="map-info">
        <h3>${room.name}</h3>
        <p>${room.subtitle}</p>
        <div class="map-bar"><div class="map-bar-fill" style="width:${pct}%;background:${colors.accent||'var(--gold)'}"></div></div>
      </div>
      <div class="map-pct">${pct}%</div>
      ${!unlocked ? '<div class="map-lock">🔒</div>' : ''}
    `;
    if (unlocked) node.onclick = () => enterRoom(slug);
    path.appendChild(node);
  });
}
renderMap();

// === ROOM VIEW ===
function enterRoom(slug) {
  currentRoomSlug = slug;
  document.getElementById('map-view').style.display = 'none';
  const rv = document.getElementById('room-view');
  rv.classList.add('active');

  const room = ROOMS[slug];
  const info = GS.rooms[slug] || {};
  const colors = ROOM_COLORS[slug] || {};

  document.getElementById('room-title').textContent = room.name;
  document.getElementById('room-pct').textContent = (info.percent||0) + '%';
  document.getElementById('room-floor').style.background = colors.bg || 'var(--glass)';
  document.getElementById('room-scene').style.borderColor = (colors.accent||'var(--gold)') + '22';

  // Render objects in grid
  const grid = document.getElementById('room-grid');
  grid.innerHTML = '';

  const puzzleClusters = room.objects.filter(o => o.type === 'puzzle_cluster' || o.type === 'boss');
  const door = room.objects.find(o => o.type === 'door');
  const npc = room.objects.find(o => o.type === 'npc');

  // Determine sequential unlock: cluster N is active only if cluster N-1 is complete
  let prevComplete = true;
  const clusterStates = puzzleClusters.map(obj => {
    const levels = obj.levels || [];
    const done = levels.filter(s => completedSlugs.has(s)).length;
    const total = levels.length;
    const allDone = done >= total;
    const isBoss = obj.type === 'boss';

    let state = 'locked';
    if (isBoss) {
      const allClustersComplete = puzzleClusters.filter(o => o.type === 'puzzle_cluster').every(o =>
        (o.levels||[]).every(s => completedSlugs.has(s))
      );
      state = allClustersComplete ? (allDone ? 'complete' : 'active') : 'locked';
    } else if (allDone) {
      state = 'complete';
      prevComplete = true;
    } else if (prevComplete) {
      state = 'active';
      prevComplete = false;
    } else {
      state = 'locked';
    }
    return { obj, done, total, state, isBoss };
  });

  clusterStates.forEach(({ obj, done, total, state, isBoss }) => {
    const el = document.createElement('div');
    el.className = `room-obj ${state}${isBoss ? ' boss' : ''}`;
    const nextLevel = (obj.levels||[]).find(s => !completedSlugs.has(s));
    const icon = isBoss ? '⚔️' : '📋';
    el.innerHTML = `
      <div class="obj-icon">${icon}</div>
      <div class="obj-label">${obj.label || 'Misión'}</div>
      <div class="obj-progress">${done}/${total}</div>
      <div class="obj-badge ${state === 'active' ? 'quest' : state === 'complete' ? 'done' : 'lock'}">
        ${state === 'active' ? '!' : state === 'complete' ? '✓' : '🔒'}
      </div>
    `;
    if (state === 'active' && nextLevel) {
      el.onclick = () => {
        if (obj.intro_dialogue) {
          showDialogue(obj.intro_dialogue.speaker, obj.intro_dialogue.lines, () => openPuzzle(slug, nextLevel));
        } else {
          openPuzzle(slug, nextLevel);
        }
      };
    }
    grid.appendChild(el);
  });

  // Door
  if (door) {
    const doorUnlocked = (info.percent || 0) >= (door.requires_percent || 70);
    const el = document.createElement('div');
    el.className = `room-obj door ${doorUnlocked ? 'active' : 'locked'}`;
    el.innerHTML = `
      <div class="obj-icon">🚪</div>
      <div class="obj-label">${doorUnlocked ? 'Siguiente sala' : 'Bloqueada'}</div>
      <div class="obj-badge ${doorUnlocked ? 'quest' : 'lock'}">${doorUnlocked ? '→' : '🔒'}</div>
    `;
    if (doorUnlocked && door.target_room) {
      el.onclick = () => {
        const dlg = door.unlocked_dialogue || { speaker: 'NARRADOR', lines: ['La puerta se abre.'] };
        showDialogue(dlg.speaker, dlg.lines, () => {
          GS.rooms[door.target_room] = GS.rooms[door.target_room] || { unlocked: true, levels_passed: [], percent: 0 };
          GS.rooms[door.target_room].unlocked = true;
          enterRoom(door.target_room);
        });
      };
    } else if (!doorUnlocked) {
      el.style.cursor = 'pointer'; el.style.pointerEvents = 'auto'; el.style.opacity = '.6';
      el.onclick = () => {
        const dlg = door.locked_dialogue || { speaker: 'NARRADOR', lines: ['La puerta está cerrada.'] };
        showDialogue(dlg.speaker, dlg.lines, () => {});
      };
    }
    grid.appendChild(el);
  }

  // NPC
  const npcStrip = document.getElementById('npc-strip');
  npcStrip.innerHTML = '';
  if (npc) {
    const pct = info.percent || 0;
    let dlgData = npc.dialogues?.progress_0;
    if (pct >= 100 && npc.dialogues?.progress_100) dlgData = npc.dialogues.progress_100;
    else if (pct >= 50 && npc.dialogues?.progress_50) dlgData = npc.dialogues.progress_50;
    const preview = (dlgData?.lines?.[0] || '').slice(0, 60) + '...';

    const card = document.createElement('div');
    card.className = 'npc-card';
    card.innerHTML = `
      <div class="npc-face">👴</div>
      <div class="npc-info"><h4>${npc.label || 'Don Ramón'}</h4><p>${preview}</p></div>
      <div class="npc-chat-icon">💬</div>
    `;
    card.onclick = () => {
      showDialogue(dlgData?.speaker || 'DON RAMÓN', dlgData?.lines || ['...'], () => {
        openMentor();
      });
    };
    npcStrip.appendChild(card);
  }

  document.getElementById('app').scrollTo(0, 0);
}

document.getElementById('room-back').onclick = () => {
  document.getElementById('room-view').classList.remove('active');
  document.getElementById('map-view').style.display = 'flex';
  currentRoomSlug = null;
  renderMap();
};

// === DIALOGUE ===
let dlgQueue = [], dlgCallback = null, dlgTyping = false, dlgTimer = null;
const dlgOverlay = document.getElementById('dialogue-overlay');
const dlgSpeaker = document.getElementById('dlg-speaker');
const dlgText = document.getElementById('dlg-text');

function showDialogue(speaker, lines, onDone) {
  dlgQueue = [...lines];
  dlgCallback = onDone;
  dlgSpeaker.textContent = speaker === 'NARRADOR' ? '' : speaker;
  dlgSpeaker.style.display = speaker === 'NARRADOR' ? 'none' : '';
  dlgOverlay.classList.add('active');
  typeNextLine();
}

function typeNextLine() {
  if (dlgQueue.length === 0) { closeDialogue(); return; }
  const line = dlgQueue.shift();
  dlgText.textContent = '';
  dlgText.classList.add('typing');
  dlgTyping = true;
  let i = 0;
  dlgTimer = setInterval(() => {
    i++;
    dlgText.textContent = line.slice(0, i);
    if (i >= line.length) { clearInterval(dlgTimer); dlgTyping = false; dlgText.classList.remove('typing'); }
  }, 25);
}

function advanceDialogue() {
  if (dlgTyping) { clearInterval(dlgTimer); dlgText.textContent = dlgQueue.length > 0 ? dlgText.textContent : dlgText.textContent; dlgText.textContent = dlgText.textContent; /* show full */ clearInterval(dlgTimer); dlgTyping = false; dlgText.classList.remove('typing'); const full = dlgText.textContent; /* already showing partial */ return; }
  typeNextLine();
}

function closeDialogue() {
  dlgOverlay.classList.remove('active');
  clearInterval(dlgTimer);
  dlgTyping = false;
  if (dlgCallback) { const cb = dlgCallback; dlgCallback = null; cb(); }
}

dlgOverlay.onclick = advanceDialogue;
document.addEventListener('keydown', e => { if (dlgOverlay.classList.contains('active') && (e.key === 'Enter' || e.key === ' ')) { e.preventDefault(); advanceDialogue(); } });

// === PUZZLE OVERLAY ===
const puzzleOverlay = document.getElementById('puzzle-overlay');
let puzzleStartTime = 0, puzzleHintUsed = false, currentPuzzleSlug = '';

async function openPuzzle(roomSlug, levelSlug) {
  currentPuzzleSlug = levelSlug;
  puzzleHintUsed = false;
  puzzleStartTime = Date.now();

  const res = await fetch(`/api/game/level/${levelSlug}`);
  if (!res.ok) { alert('Error cargando nivel'); return; }
  const data = await res.json();

  // Show concept popups first
  if (data.new_concepts && data.new_concepts.length > 0) {
    await showConcepts(data.new_concepts);
  }

  document.getElementById('puzzle-title').textContent = data.title;
  document.getElementById('puzzle-xp').textContent = '+' + data.xp + ' XP';

  const body = document.getElementById('puzzle-body');
  body.innerHTML = '';

  // Scenario
  if (data.scenario_md) {
    const sc = document.createElement('div');
    sc.className = 'puzzle-scenario';
    sc.textContent = data.scenario_md;
    body.appendChild(sc);
  }

  // Widget
  const widget = document.createElement('div');
  widget.className = 'puzzle-widget';
  body.appendChild(widget);

  renderPuzzleWidget(widget, data);

  // Hint
  if (data.hint_md) {
    const hintBtn = document.createElement('button');
    hintBtn.className = 'pw-hint-btn';
    hintBtn.textContent = 'Ver pista';
    const hintDiv = document.createElement('div');
    hintDiv.className = 'pw-hint';
    hintDiv.textContent = data.hint_md;
    hintBtn.onclick = () => { hintDiv.classList.toggle('visible'); puzzleHintUsed = true; hintBtn.textContent = hintDiv.classList.contains('visible') ? 'Ocultar pista' : 'Ver pista'; };
    body.appendChild(hintBtn);
    body.appendChild(hintDiv);
  }

  puzzleOverlay.classList.add('active');
}

document.getElementById('puzzle-close').onclick = () => puzzleOverlay.classList.remove('active');

async function submitAttempt(passed, payload) {
  const elapsed = Math.round((Date.now() - puzzleStartTime) / 1000);
  const res = await fetch('/api/game/attempt', {
    method: 'POST', headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ level_slug: currentPuzzleSlug, passed, hint_used: puzzleHintUsed, payload: payload || {}, duration_seconds: elapsed })
  });
  const data = await res.json();
  if (passed) {
    completedSlugs.add(currentPuzzleSlug);
    totalXp += data.xp_awarded || 0;
    updateHud();
    recalcRoomProgress();
    puzzleOverlay.classList.remove('active');
    showSuccess(data.xp_awarded || 0);
  }
  return data;
}

function recalcRoomProgress() {
  for (const slug of ROOM_ORDER) {
    const room = ROOMS[slug];
    if (!room) continue;
    const allLevels = room.objects.filter(o => o.levels).flatMap(o => o.levels);
    const done = allLevels.filter(s => completedSlugs.has(s)).length;
    GS.rooms[slug] = GS.rooms[slug] || { unlocked: false, levels_passed: [], percent: 0 };
    GS.rooms[slug].percent = allLevels.length > 0 ? Math.round(done / allLevels.length * 100) : 0;
    GS.rooms[slug].levels_passed = allLevels.filter(s => completedSlugs.has(s));
  }
  // Unlock next rooms
  for (let i = 1; i < ROOM_ORDER.length; i++) {
    const prev = GS.rooms[ROOM_ORDER[i - 1]];
    if (prev && prev.percent >= 70) GS.rooms[ROOM_ORDER[i]].unlocked = true;
  }
}

// === PUZZLE RENDERERS ===
function renderPuzzleWidget(container, data) {
  const kind = data.kind;
  const payload = data.payload || {};
  switch (kind) {
    case 'order_steps': renderOrderSteps(container, payload); break;
    case 'multi_choice': renderMultiChoice(container, payload); break;
    case 'fill_blank': renderFillBlank(container, payload); break;
    case 'tf': renderTF(container, payload); break;
    case 'predict': renderPredict(container, payload); break;
    case 'decision': renderDecision(container, payload); break;
    case 'code': renderCode(container, payload); break;
    case 'boss': renderBoss(container, data); break;
    default: container.innerHTML = `<p style="color:var(--dim)">Tipo de puzzle: ${kind}</p>`;
  }
}

function renderOrderSteps(c, p) {
  const steps = p.steps || [];
  const correct = p.correct_order || steps.map((_, i) => i);
  const indices = steps.map((_, i) => i);
  for (let i = indices.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1)); [indices[i], indices[j]] = [indices[j], indices[i]]; }

  c.innerHTML = '<div class="pw-instruction">Ordena los pasos</div>';
  const ul = document.createElement('ul');
  ul.className = 'pw-list';
  indices.forEach((idx, pos) => {
    const li = document.createElement('li');
    li.className = 'pw-step';
    li.draggable = true;
    li.dataset.idx = idx;
    li.innerHTML = `<span class="pw-step-handle">⠿</span><span class="pw-step-num">${pos + 1}</span><span>${esc(steps[idx])}</span>`;
    ul.appendChild(li);
  });
  c.appendChild(ul);

  // Drag
  let dragSrc = null;
  ul.addEventListener('dragstart', e => { dragSrc = e.target.closest('.pw-step'); if (dragSrc) dragSrc.classList.add('dragging'); });
  ul.addEventListener('dragend', () => { ul.querySelectorAll('.pw-step').forEach(el => el.classList.remove('dragging', 'drag-over')); renum(ul); });
  ul.addEventListener('dragover', e => { e.preventDefault(); const t = e.target.closest('.pw-step'); if (!t || t === dragSrc) return; ul.querySelectorAll('.pw-step.drag-over').forEach(el => el.classList.remove('drag-over')); t.classList.add('drag-over'); const r = t.getBoundingClientRect(); if (e.clientY < r.top + r.height / 2) ul.insertBefore(dragSrc, t); else ul.insertBefore(dragSrc, t.nextSibling); });

  // Touch drag
  let touchEl = null, touchClone = null;
  ul.addEventListener('touchstart', e => {
    const t = e.target.closest('.pw-step'); if (!t) return;
    touchEl = t; t.classList.add('dragging');
  }, { passive: true });
  ul.addEventListener('touchmove', e => {
    if (!touchEl) return; e.preventDefault();
    const touch = e.touches[0];
    const els = [...ul.querySelectorAll('.pw-step')];
    for (const el of els) {
      if (el === touchEl) continue;
      const r = el.getBoundingClientRect();
      if (touch.clientY > r.top && touch.clientY < r.bottom) {
        if (touch.clientY < r.top + r.height / 2) ul.insertBefore(touchEl, el);
        else ul.insertBefore(touchEl, el.nextSibling);
        break;
      }
    }
  }, { passive: false });
  ul.addEventListener('touchend', () => { if (touchEl) { touchEl.classList.remove('dragging'); touchEl = null; renum(ul); } });

  const btn = document.createElement('button');
  btn.className = 'btn-verify';
  btn.textContent = 'Verificar orden';
  btn.onclick = () => {
    const current = [...ul.querySelectorAll('.pw-step')].map(li => parseInt(li.dataset.idx));
    const ok = current.every((v, i) => v === correct[i]);
    submitAttempt(ok, { submitted_order: current });
    if (!ok) showFeedback(c, false, 'Orden incorrecto. Revisa la lógica paso a paso.');
  };
  c.appendChild(btn);
  addFeedbackEl(c);
}

function renderMultiChoice(c, p) {
  const options = p.options || [];
  c.innerHTML = '<div class="pw-instruction">Selecciona la respuesta correcta</div>';
  let selected = null, answered = false;
  const list = document.createElement('div');
  list.className = 'pw-list';
  const letters = 'ABCDE';
  const cards = options.map((opt, i) => {
    const d = document.createElement('button');
    d.className = 'pw-choice';
    d.innerHTML = `<span class="pw-choice-letter">${letters[i]}</span><span>${esc(opt.text || opt.label || '')}</span>`;
    d.onclick = () => { if (answered) return; list.querySelectorAll('.pw-choice').forEach(c => c.classList.remove('selected')); d.classList.add('selected'); selected = i; };
    list.appendChild(d);
    return d;
  });
  c.appendChild(list);
  const btn = document.createElement('button');
  btn.className = 'btn-verify';
  btn.textContent = 'Verificar';
  btn.onclick = () => {
    if (selected === null) { showFeedback(c, false, 'Selecciona una opción.'); return; }
    if (answered) return;
    answered = true;
    const opt = options[selected];
    const ok = !!(opt.correct || opt.is_correct);
    cards.forEach((card, i) => { if (options[i].correct || options[i].is_correct) card.classList.add('correct'); });
    if (!ok) cards[selected].classList.add('wrong');
    submitAttempt(ok, { selected_index: selected });
    if (!ok) showFeedback(c, false, opt.feedback || 'Incorrecto.');
    btn.disabled = true;
  };
  c.appendChild(btn);
  addFeedbackEl(c);
}

function renderFillBlank(c, p) {
  const tmpl = p.code_template || '';
  const blanks = p.blanks || [];
  c.innerHTML = '<div class="pw-instruction">Completa los espacios en blanco</div>';
  const code = document.createElement('div');
  code.className = 'pw-code';
  code.style.whiteSpace = 'pre-wrap';
  let blankIdx = 0;
  const inputs = [];
  tmpl.split('___').forEach((part, i) => {
    code.appendChild(document.createTextNode(part));
    if (i < tmpl.split('___').length - 1) {
      const inp = document.createElement('input');
      inp.type = 'text';
      inp.className = 'pw-blank';
      inp.placeholder = blanks[blankIdx]?.label || '...';
      inp.size = Math.max(8, (blanks[blankIdx]?.label || '').length);
      inputs.push(inp);
      code.appendChild(inp);
      blankIdx++;
    }
  });
  c.appendChild(code);
  const btn = document.createElement('button');
  btn.className = 'btn-verify';
  btn.textContent = 'Verificar';
  btn.onclick = () => {
    let allOk = true;
    inputs.forEach((inp, i) => {
      const val = inp.value.trim();
      const ok = blanks[i]?.correct?.map(c => c.trim()).includes(val);
      inp.classList.toggle('correct', ok);
      inp.classList.toggle('wrong', !ok);
      if (!ok) allOk = false;
    });
    submitAttempt(allOk, { answers: inputs.map(i => i.value.trim()) });
    if (!allOk) showFeedback(c, false, 'Algún espacio no es correcto.');
  };
  c.appendChild(btn);
  addFeedbackEl(c);
}

function renderTF(c, p) {
  const stmt = p.statement || '';
  const correct = p.correct;
  c.innerHTML = '<div class="pw-instruction">Verdadero o Falso</div>';
  if (stmt) { const s = document.createElement('p'); s.style.cssText = 'font:400 14px var(--ff-body);color:var(--cream-d);line-height:1.6;margin-bottom:12px;'; s.textContent = stmt; c.appendChild(s); }
  const row = document.createElement('div');
  row.className = 'pw-tf-row';
  let answered = false;
  ['Verdadero', 'Falso'].forEach((label, i) => {
    const btn = document.createElement('button');
    btn.className = 'pw-tf';
    btn.textContent = label;
    btn.onclick = () => {
      if (answered) return;
      answered = true;
      const val = i === 0;
      const ok = val === correct;
      btn.classList.add(ok ? 'correct' : 'wrong');
      row.querySelectorAll('.pw-tf').forEach((b, j) => { if ((j === 0) === correct) b.classList.add('correct'); });
      submitAttempt(ok, { selected: val });
    };
    row.appendChild(btn);
  });
  c.appendChild(row);
  addFeedbackEl(c);
}

function renderPredict(c, p) {
  const code = p.code || '';
  const expected = (p.expected_output || '').trim();
  c.innerHTML = '<div class="pw-instruction">¿Qué imprime este código?</div>';
  const pre = document.createElement('pre');
  pre.className = 'pw-code';
  pre.textContent = code;
  c.appendChild(pre);
  const inp = document.createElement('textarea');
  inp.className = 'pw-input';
  inp.placeholder = 'Escribe la salida exacta...';
  inp.rows = 3;
  c.appendChild(inp);
  const btn = document.createElement('button');
  btn.className = 'btn-verify';
  btn.textContent = 'Verificar';
  btn.onclick = () => {
    const ok = inp.value.trim() === expected;
    submitAttempt(ok, { answer: inp.value.trim() });
    if (!ok) showFeedback(c, false, `Salida esperada: "${expected}"`);
    btn.disabled = true;
  };
  c.appendChild(btn);
  addFeedbackEl(c);
}

function renderDecision(c, p) {
  const options = p.options || [];
  c.innerHTML = '<div class="pw-instruction">Toma una decisión</div>';
  if (p.prompt_md) { const pr = document.createElement('div'); pr.className = 'puzzle-scenario'; pr.style.marginBottom = '14px'; pr.textContent = p.prompt_md; c.appendChild(pr); }
  const list = document.createElement('div');
  list.className = 'pw-list';
  options.forEach((opt, i) => {
    const d = document.createElement('button');
    d.className = 'pw-choice';
    d.innerHTML = `<span class="pw-choice-letter">${i + 1}</span><div><strong>${esc(opt.label || '')}</strong><br><span style="font-size:12px;color:var(--cream-d)">${esc(opt.tradeoff_md || opt.tradeoff || '')}</span></div>`;
    d.onclick = () => { submitAttempt(true, { chosen_index: i }); };
    list.appendChild(d);
  });
  c.appendChild(list);
}

function renderCode(c, p) {
  const starter = p.starter || '';
  const tests = p.tests || '';
  c.innerHTML = '<div class="pw-instruction">Escribe tu solución</div>';
  const ta = document.createElement('textarea');
  ta.className = 'pw-editor';
  ta.value = starter;
  ta.spellcheck = false;
  ta.addEventListener('keydown', e => { if (e.key === 'Tab') { e.preventDefault(); const s = ta.selectionStart; ta.value = ta.value.substring(0, s) + '    ' + ta.value.substring(ta.selectionEnd); ta.selectionStart = ta.selectionEnd = s + 4; } });
  c.appendChild(ta);
  const out = document.createElement('div');
  out.className = 'pw-output';
  c.appendChild(out);
  const btn = document.createElement('button');
  btn.className = 'btn-verify';
  btn.textContent = 'Verificar';
  btn.onclick = async () => {
    btn.disabled = true;
    out.textContent = 'Ejecutando...';
    out.className = 'pw-output visible';
    try {
      if (!window.loadPyodide) throw new Error('Pyodide no disponible');
      const pyodide = await window.loadPyodide();
      let output = '';
      pyodide.setStdout({ batched: s => { output += s + '\n'; } });
      pyodide.setStderr({ batched: s => { output += s + '\n'; } });
      const fullCode = ta.value + '\n\n' + tests;
      await pyodide.runPythonAsync(fullCode);
      out.textContent = output || '✓ Todos los tests pasan';
      out.className = 'pw-output visible';
      submitAttempt(true, { code: ta.value });
    } catch (err) {
      out.textContent = err.message;
      out.className = 'pw-output visible error';
      showFeedback(c, false, 'El código tiene errores. Corrígelo y vuelve a intentar.');
      btn.disabled = false;
    }
  };
  c.appendChild(btn);
  addFeedbackEl(c);
}

function renderBoss(c, data) {
  const steps = data.payload?.steps || [];
  c.innerHTML = '<div class="pw-instruction">⚔️ Nivel Jefe — ' + steps.length + ' desafíos</div>';
  let currentStep = 0;
  function showStep(i) {
    const step = steps[i];
    const stepC = document.createElement('div');
    stepC.style.cssText = 'margin-top:12px;padding:14px;border:1px solid rgba(255,255,255,.06);border-radius:var(--r-md);';
    if (step.title) { const h = document.createElement('h3'); h.style.cssText = 'font:700 14px var(--ff-title);color:var(--cream);margin-bottom:10px;'; h.textContent = `Paso ${i+1}: ${step.title}`; stepC.appendChild(h); }
    if (step.scenario_md) { const p = document.createElement('p'); p.style.cssText = 'font:400 13px var(--ff-body);color:var(--cream-d);margin-bottom:12px;'; p.textContent = step.scenario_md; stepC.appendChild(p); }
    const subWidget = document.createElement('div');
    renderPuzzleWidget(subWidget, { kind: step.kind || 'multi_choice', payload: step, hint_md: step.hint_md });
    stepC.appendChild(subWidget);
    c.appendChild(stepC);
  }
  showStep(0);
  // Boss simplified: each sub-step submits independently, last one completes the boss
}

// Helpers
function addFeedbackEl(c) {
  const fb = document.createElement('div');
  fb.className = 'pw-feedback';
  c.appendChild(fb);
}
function showFeedback(c, ok, msg) {
  const fb = c.querySelector('.pw-feedback');
  if (!fb) return;
  fb.textContent = msg;
  fb.className = `pw-feedback visible ${ok ? 'success' : 'fail'}`;
  if (!ok) setTimeout(() => fb.classList.remove('visible'), 4000);
}
function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function renum(ul) { ul.querySelectorAll('.pw-step-num').forEach((el, i) => el.textContent = i + 1); }

// === CONCEPT POPUPS ===
function showConcepts(concepts) {
  return new Promise(resolve => {
    let i = 0;
    const overlay = document.getElementById('concept-overlay');
    function show(idx) {
      const c = concepts[idx];
      document.getElementById('concept-title').textContent = c.title;
      document.getElementById('concept-analogy').textContent = c.analogy_md || '';
      const ex = document.getElementById('concept-example');
      ex.textContent = c.example_md || '';
      ex.style.display = c.example_md ? '' : 'none';
      document.getElementById('concept-count').textContent = `${idx + 1} de ${concepts.length}`;
      document.getElementById('concept-btn').textContent = idx < concepts.length - 1 ? 'Siguiente' : 'Entendido';
      overlay.classList.add('active');
      fetch('/api/game/concept-seen', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ concept_slug: c.slug }) }).catch(() => {});
    }
    document.getElementById('concept-btn').onclick = () => {
      i++;
      if (i < concepts.length) show(i);
      else { overlay.classList.remove('active'); resolve(); }
    };
    show(0);
  });
}

// === SUCCESS ===
function showSuccess(xp) {
  const overlay = document.getElementById('success-overlay');
  document.getElementById('success-xp').textContent = `+${xp} XP`;
  overlay.classList.add('active');
  // XP toast
  const toast = document.createElement('div');
  toast.className = 'xp-toast';
  toast.textContent = `+${xp} XP`;
  document.body.appendChild(toast);
  setTimeout(() => toast.remove(), 1200);

  document.getElementById('success-btn').onclick = () => {
    overlay.classList.remove('active');
    if (currentRoomSlug) enterRoom(currentRoomSlug);
    else { document.getElementById('room-view').classList.remove('active'); document.getElementById('map-view').style.display = 'flex'; renderMap(); }
  };
}

// === MENTOR CHAT ===
function openMentor() {
  document.getElementById('mentor-panel').classList.add('active');
}
document.getElementById('close-mentor').onclick = () => document.getElementById('mentor-panel').classList.remove('active');
document.getElementById('mentor-send').onclick = sendMentorMsg;
document.getElementById('mentor-input').addEventListener('keydown', e => { if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') sendMentorMsg(); });

async function sendMentorMsg() {
  const input = document.getElementById('mentor-input');
  const msg = input.value.trim();
  if (!msg) return;
  input.value = '';
  const msgs = document.getElementById('mentor-msgs');
  msgs.innerHTML += `<div class="mentor-msg user">${esc(msg)}</div>`;
  const botMsg = document.createElement('div');
  botMsg.className = 'mentor-msg assistant';
  botMsg.textContent = '...';
  msgs.appendChild(botMsg);
  msgs.scrollTop = msgs.scrollHeight;

  try {
    const res = await fetch('/api/game/chat', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ message: msg, level_slug: currentPuzzleSlug || null, context: currentRoomSlug ? `Sala: ${currentRoomSlug}` : '' })
    });
    botMsg.textContent = '';
    const reader = res.body.getReader();
    const dec = new TextDecoder();
    let buf = '';
    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      buf += dec.decode(value, { stream: true });
      const lines = buf.split('\n');
      buf = lines.pop();
      let evt = '';
      for (const line of lines) {
        if (line.startsWith('event: ')) evt = line.slice(7).trim();
        else if (line.startsWith('data: ')) {
          const raw = line.slice(6).trim();
          if (raw === '[DONE]') break;
          try { const obj = JSON.parse(raw); if (evt === 'delta' && obj.text) botMsg.textContent += obj.text; } catch {}
        }
      }
      msgs.scrollTop = msgs.scrollHeight;
    }
  } catch { botMsg.textContent = 'Don Ramón no está disponible ahora.'; }
}

// Auto-enter first active room
const firstActive = ROOM_ORDER.find(s => GS.rooms[s]?.unlocked && (GS.rooms[s]?.percent||0) < 100) || ROOM_ORDER[0];
if (GS.rooms[firstActive]?.unlocked) enterRoom(firstActive);
