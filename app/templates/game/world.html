<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>bato-learning</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400&family=DM+Sans:wght@400;500;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/pyodide/v0.27.0/full/pyodide.js" async></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
--void:#07080d;--ink:#0d0e16;--parchment:rgba(15,16,24,.92);
--gold:#c49b2a;--gold-l:#e4be4a;--gold-d:#785e18;--gold-g:rgba(196,155,42,.2);
--jade:#2d9b62;--jade-g:rgba(45,155,98,.15);
--ruby:#b83c3c;--ruby-g:rgba(184,60,60,.15);
--cream:#e6dbc6;--cream-d:#a09480;--dim:#54504a;
--serif:'Cormorant Garamond',Georgia,serif;
--sans:'DM Sans',system-ui,sans-serif;
--mono:'JetBrains Mono',monospace;
--ease:cubic-bezier(.22,1,.36,1);
}
html,body{height:100%;background:var(--void);color:var(--cream);font-family:var(--sans);-webkit-font-smoothing:antialiased;overflow:hidden}

/* ═══ CHAPTER SELECT ═══ */
#chapters{height:100%;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:0 0 60px}
.ch-header{text-align:center;padding:48px 20px 12px}
.ch-header h1{font:700 28px/1.1 var(--serif);color:var(--cream);letter-spacing:.04em}
.ch-header p{font:400 13px var(--sans);color:var(--dim);margin-top:6px}
.ch-list{max-width:480px;margin:24px auto 0;padding:0 16px;display:flex;flex-direction:column;gap:2px}

.ch-item{position:relative;border-radius:12px;overflow:hidden;transition:all .3s var(--ease)}
.ch-item.locked{opacity:.35;pointer-events:none}

.ch-scene{height:180px;position:relative;display:flex;align-items:flex-end;padding:16px;cursor:pointer;transition:all .3s}
.ch-scene:hover{filter:brightness(1.08)}
.ch-scene::after{content:'';position:absolute;inset:0;background:linear-gradient(0deg,rgba(7,8,13,.88) 0%,rgba(7,8,13,.2) 60%,transparent)}
.ch-scene-bg{position:absolute;inset:0;z-index:0}
.ch-meta{position:relative;z-index:2;width:100%}
.ch-num{font:600 10px var(--mono);color:var(--gold);letter-spacing:.15em;text-transform:uppercase;margin-bottom:4px}
.ch-name{font:700 22px var(--serif);color:var(--cream);margin-bottom:4px}
.ch-desc{font:400 13px/1.5 var(--sans);color:var(--cream-d);margin-bottom:10px}
.ch-bar{height:3px;background:rgba(255,255,255,.06);border-radius:2px;overflow:hidden}
.ch-bar-fill{height:100%;border-radius:2px;transition:width .6s var(--ease)}
.ch-pct{font:600 11px var(--mono);color:var(--gold-l);margin-top:6px}
.ch-btn{display:inline-flex;align-items:center;gap:6px;padding:8px 20px;background:var(--gold);color:var(--void);font:700 13px var(--sans);border:none;border-radius:8px;cursor:pointer;margin-top:10px;transition:all .2s}
.ch-btn:hover{background:var(--gold-l);transform:translateY(-1px)}
.ch-lock-badge{position:absolute;top:12px;right:14px;z-index:3;font:700 11px var(--mono);color:var(--dim);background:rgba(0,0,0,.5);padding:3px 10px;border-radius:6px}
.ch-complete-badge{position:absolute;top:12px;right:14px;z-index:3;font:700 11px var(--mono);color:var(--jade);background:rgba(45,155,98,.12);padding:3px 10px;border-radius:6px}

/* ═══ STORY VIEW ═══ */
#story{display:none;height:100%;flex-direction:column;overflow:hidden}
#story.active{display:flex}

.story-hud{display:flex;align-items:center;gap:10px;padding:8px 14px;background:rgba(7,8,13,.85);border-bottom:1px solid rgba(255,255,255,.04);backdrop-filter:blur(10px);flex-shrink:0;z-index:20}
.story-back{background:none;border:none;color:var(--cream-d);font:500 13px var(--sans);cursor:pointer;display:flex;align-items:center;gap:4px;padding:4px 8px;border-radius:6px;transition:all .15s}
.story-back:hover{background:rgba(255,255,255,.05);color:var(--cream)}
.story-room{font:600 14px var(--serif);color:var(--cream);flex:1;text-align:center}
.story-progress{font:600 11px var(--mono);color:var(--gold)}

.story-scroll{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch}
.story-content{max-width:600px;margin:0 auto;padding:0 16px 80px}

/* Scene — atmospheric header per room */
.scene-stage{position:relative;width:calc(100% + 32px);margin:0 -16px;height:220px;display:flex;align-items:flex-end;justify-content:center;overflow:hidden}
.scene-bg{position:absolute;inset:0}
.scene-bg::after{content:'';position:absolute;inset:0;background:linear-gradient(0deg,var(--void) 0%,transparent 60%)}
.scene-portrait{position:relative;z-index:2;margin-bottom:-30px;transition:all .5s var(--ease)}
.portrait-ring{width:100px;height:100px;border-radius:50%;border:3px solid var(--gold-d);background:var(--ink);display:flex;align-items:center;justify-content:center;font-size:52px;box-shadow:0 0 30px var(--gold-g),0 4px 20px rgba(0,0,0,.5);position:relative;overflow:hidden}
.portrait-ring::before{content:'';position:absolute;inset:-2px;border-radius:50%;background:conic-gradient(var(--gold),var(--gold-d),var(--gold),var(--gold-d),var(--gold));z-index:-1;animation:portraitSpin 8s linear infinite}
@keyframes portraitSpin{to{transform:rotate(360deg)}}
.portrait-mood{position:absolute;bottom:2px;right:2px;font-size:16px;background:var(--ink);border-radius:50%;width:24px;height:24px;display:flex;align-items:center;justify-content:center;border:2px solid var(--gold-d)}

/* Dialogue */
.dialogue{margin-top:40px;padding:18px 20px;border-left:3px solid var(--gold-d);background:var(--parchment);border-radius:0 10px 10px 0;position:relative;min-height:60px}
.dialogue-name{font:700 11px var(--mono);color:var(--gold);letter-spacing:.08em;text-transform:uppercase;margin-bottom:6px}
.dialogue-body{font:400 15px/1.7 var(--serif);color:var(--cream);min-height:24px}
.dialogue-body.typing::after{content:'▎';color:var(--gold);animation:blink .5s infinite}
.dialogue-tap{font:400 11px var(--sans);color:var(--dim);text-align:right;margin-top:6px;opacity:0;transition:opacity .3s}
.dialogue-tap.show{opacity:1}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}

/* Narration text (between puzzles) */
.narration{margin-top:24px;font:400 14px/1.8 var(--serif);color:var(--cream-d);font-style:italic;text-align:center;padding:0 12px}

/* ═══ PUZZLE AREA (inline) ═══ */
.puzzle-area{margin-top:28px;animation:puzzleReveal .5s var(--ease) both}
@keyframes puzzleReveal{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
.puzzle-label{font:700 11px var(--mono);color:var(--gold);letter-spacing:.1em;text-transform:uppercase;margin-bottom:6px;display:flex;align-items:center;gap:6px}
.puzzle-label::before{content:'';width:8px;height:8px;border-radius:50%;background:var(--gold);animation:dotPulse 2s ease-in-out infinite}
@keyframes dotPulse{0%,100%{opacity:.5;transform:scale(.8)}50%{opacity:1;transform:scale(1)}}
.puzzle-scenario{font:400 14px/1.65 var(--sans);color:var(--cream-d);margin-bottom:16px;padding:12px 14px;background:rgba(196,155,42,.04);border-radius:8px;border:1px solid rgba(196,155,42,.08)}
.puzzle-widget{padding:16px;background:rgba(255,255,255,.02);border:1px solid rgba(255,255,255,.05);border-radius:10px}

/* Widget elements */
.w-list{list-style:none;display:flex;flex-direction:column;gap:6px}
.w-step{display:flex;align-items:center;gap:10px;padding:10px 12px;background:rgba(255,255,255,.02);border:1px solid rgba(255,255,255,.05);border-radius:8px;cursor:grab;user-select:none;font:400 13px var(--sans);color:var(--cream);transition:all .15s}
.w-step:active{cursor:grabbing;background:rgba(255,255,255,.04)}
.w-step.dragging{opacity:.4}
.w-step.drag-over{border-color:var(--gold);background:rgba(196,155,42,.06)}
.w-step-n{width:20px;height:20px;border-radius:50%;background:rgba(255,255,255,.05);display:flex;align-items:center;justify-content:center;font:700 10px var(--mono);color:var(--dim);flex-shrink:0}
.w-step-grip{color:var(--dim);flex-shrink:0;font-size:12px}

.w-choice{display:flex;align-items:flex-start;gap:12px;padding:12px;background:rgba(255,255,255,.02);border:2px solid rgba(255,255,255,.05);border-radius:8px;cursor:pointer;transition:all .2s;width:100%;text-align:left;font:400 13px var(--sans);color:var(--cream)}
.w-choice:hover{border-color:rgba(255,255,255,.12);background:rgba(255,255,255,.03)}
.w-choice.sel{border-color:var(--gold);background:var(--gold-g)}
.w-choice.ok{border-color:var(--jade)!important;background:var(--jade-g)!important}
.w-choice.no{border-color:var(--ruby)!important;background:var(--ruby-g)!important}
.w-letter{width:22px;height:22px;border-radius:4px;background:rgba(255,255,255,.05);display:flex;align-items:center;justify-content:center;font:700 11px var(--mono);color:var(--dim);flex-shrink:0}
.w-choice.sel .w-letter{background:var(--gold);color:var(--void)}

.w-code{background:rgba(0,0,0,.3);border:1px solid rgba(255,255,255,.06);border-radius:8px;padding:14px;font:400 13px/1.6 var(--mono);color:var(--cream-d);white-space:pre-wrap;overflow-x:auto;margin-bottom:12px}
.w-input{width:100%;background:rgba(0,0,0,.25);border:1px solid rgba(255,255,255,.08);border-radius:8px;color:var(--cream);font:400 13px var(--mono);padding:10px 12px;resize:vertical;outline:none}
.w-input:focus{border-color:var(--gold)}
.w-blank{display:inline-block;background:rgba(0,0,0,.35);border:none;border-bottom:2px solid var(--gold);color:var(--cream);font:400 13px var(--mono);padding:1px 6px;min-width:70px;outline:none;vertical-align:baseline}
.w-blank:focus{border-bottom-color:var(--gold-l)}
.w-blank.ok{border-bottom-color:var(--jade)}
.w-blank.no{border-bottom-color:var(--ruby)}

.w-tf{display:flex;gap:10px;margin-top:6px}
.w-tf button{flex:1;padding:14px;font:700 15px var(--sans);border-radius:10px;border:2px solid rgba(255,255,255,.06);background:rgba(255,255,255,.02);color:var(--cream);cursor:pointer;transition:all .2s}
.w-tf button:hover{background:rgba(255,255,255,.04)}
.w-tf button.sel{border-color:var(--gold);background:var(--gold-g);color:var(--gold)}
.w-tf button.ok{border-color:var(--jade)!important;background:var(--jade-g)!important;color:var(--jade)!important}
.w-tf button.no{border-color:var(--ruby)!important;background:var(--ruby-g)!important;color:var(--ruby)!important}

.w-editor{width:100%;background:rgba(0,0,0,.3);color:var(--cream);font:400 13px/1.55 var(--mono);padding:14px;border:1px solid rgba(255,255,255,.06);border-radius:8px;resize:vertical;min-height:120px;outline:none;tab-size:4}
.w-editor:focus{border-color:var(--gold)}
.w-output{margin-top:8px;background:rgba(0,0,0,.25);border-left:3px solid var(--gold-d);border-radius:0 8px 8px 0;padding:8px 12px;font:400 12px var(--mono);color:var(--cream-d);white-space:pre-wrap;display:none}
.w-output.vis{display:block}
.w-output.err{border-left-color:var(--ruby);color:var(--ruby)}

.btn-v{display:inline-flex;align-items:center;gap:6px;margin-top:14px;padding:10px 22px;background:var(--gold);color:var(--void);font:700 13px var(--sans);border:none;border-radius:8px;cursor:pointer;transition:all .2s}
.btn-v:hover{background:var(--gold-l);transform:translateY(-1px)}
.btn-v:disabled{opacity:.3;cursor:not-allowed;transform:none}
.btn-hint{background:none;border:1px solid rgba(255,255,255,.06);color:var(--cream-d);font:400 12px var(--sans);padding:5px 12px;border-radius:6px;cursor:pointer;margin-top:10px;margin-left:8px;transition:all .2s}
.btn-hint:hover{color:var(--cream);border-color:var(--gold)}
.hint-box{margin-top:8px;background:rgba(196,155,42,.04);border-left:3px solid var(--gold-d);padding:10px 14px;border-radius:0 8px 8px 0;font:400 13px var(--sans);color:var(--cream-d);display:none}
.hint-box.vis{display:block}

.pw-fb{margin-top:10px;padding:10px 14px;border-radius:8px;font:400 13px var(--sans);display:none}
.pw-fb.vis{display:block}
.pw-fb.ok{background:var(--jade-g);color:var(--jade);border-left:3px solid var(--jade)}
.pw-fb.fail{background:var(--ruby-g);color:var(--ruby);border-left:3px solid var(--ruby)}

/* ═══ SUCCESS STATE ═══ */
.success-inline{margin-top:20px;text-align:center;padding:24px 16px;border-radius:12px;background:var(--jade-g);border:1px solid rgba(45,155,98,.2);animation:successPop .4s var(--ease)}
.success-xp{font:900 36px var(--serif);color:var(--gold-l);text-shadow:0 0 20px var(--gold-g)}
.success-msg{font:400 14px var(--sans);color:var(--jade);margin:6px 0 16px}
.success-next{display:inline-flex;align-items:center;gap:6px;padding:10px 24px;background:var(--jade);color:#fff;font:700 13px var(--sans);border:none;border-radius:8px;cursor:pointer;transition:all .2s}
.success-next:hover{opacity:.9;transform:translateY(-1px)}
@keyframes successPop{from{transform:scale(.9);opacity:0}60%{transform:scale(1.02)}to{transform:scale(1);opacity:1}}

/* XP toast */
.xp-toast{position:fixed;top:56px;right:16px;z-index:99;padding:6px 14px;background:var(--gold-g);border:1px solid var(--gold-d);border-radius:6px;font:700 14px var(--mono);color:var(--gold-l);animation:toastIn .2s var(--ease),toastOut .3s .7s forwards;pointer-events:none}
@keyframes toastIn{from{transform:translateY(-16px);opacity:0}to{transform:translateY(0);opacity:1}}
@keyframes toastOut{to{transform:translateY(-8px);opacity:0}}

/* ═══ CONCEPT MODAL ═══ */
.concept-modal{display:none;position:fixed;inset:0;z-index:100;background:rgba(0,0,0,.78);backdrop-filter:blur(5px);align-items:center;justify-content:center;padding:20px}
.concept-modal.active{display:flex}
.concept-card{background:var(--ink);border:1px solid var(--gold-d);border-radius:14px;padding:24px 20px;max-width:440px;width:100%;box-shadow:0 16px 48px rgba(0,0,0,.5);animation:conceptIn .3s var(--ease)}
@keyframes conceptIn{from{transform:translateY(16px) scale(.96);opacity:0}to{transform:none;opacity:1}}
.concept-tag{display:inline-block;font:700 9px var(--mono);color:var(--gold);background:var(--gold-g);border-radius:99px;padding:3px 10px;letter-spacing:.1em;text-transform:uppercase;margin-bottom:10px}
.concept-card h2{font:700 18px var(--serif);color:var(--cream);margin-bottom:8px}
.concept-analogy{font:400 14px/1.6 var(--sans);color:var(--cream-d);margin-bottom:12px}
.concept-example{background:rgba(0,0,0,.3);border-radius:8px;padding:10px 12px;font:400 12px var(--mono);color:var(--cream-d);white-space:pre-wrap;margin-bottom:14px}
.concept-count{font:400 11px var(--sans);color:var(--dim);text-align:right;margin-bottom:10px}

/* ═══ MENTOR CHAT ═══ */
.mentor-modal{display:none;position:fixed;inset:0;z-index:90;background:rgba(0,0,0,.6);backdrop-filter:blur(4px);align-items:flex-end;justify-content:center;padding:0}
.mentor-modal.active{display:flex}
.mentor-box{width:100%;max-width:500px;max-height:60vh;background:var(--ink);border-radius:14px 14px 0 0;border:1px solid rgba(255,255,255,.05);border-bottom:none;display:flex;flex-direction:column;animation:slideUp .25s var(--ease)}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.mentor-head{display:flex;align-items:center;padding:10px 14px;border-bottom:1px solid rgba(255,255,255,.04);font:700 12px var(--mono);color:var(--gold);letter-spacing:.04em}
.mentor-head button{margin-left:auto;background:none;border:none;color:var(--cream-d);cursor:pointer;font-size:16px}
.mentor-msgs{flex:1;overflow-y:auto;padding:10px 12px;display:flex;flex-direction:column;gap:8px;min-height:100px;max-height:280px}
.m-msg{font:400 13px var(--sans);padding:8px 12px;border-radius:8px;line-height:1.5}
.m-msg.a{background:rgba(196,155,42,.06);color:var(--cream-d);border-left:2px solid var(--gold-d)}
.m-msg.u{background:rgba(255,255,255,.03);color:var(--cream-d);text-align:right}
.mentor-foot{display:flex;gap:6px;padding:8px 10px;border-top:1px solid rgba(255,255,255,.04)}
.mentor-foot textarea{flex:1;background:rgba(0,0,0,.3);border:1px solid rgba(255,255,255,.06);color:var(--cream);font:400 13px var(--sans);padding:7px 10px;border-radius:6px;resize:none;outline:none;min-height:34px}
.mentor-foot textarea:focus{border-color:var(--gold)}
.mentor-foot button{padding:7px 14px;background:var(--gold);color:var(--void);font:700 12px var(--sans);border:none;border-radius:6px;cursor:pointer}
.ask-mentor{background:none;border:none;color:var(--gold-d);font:400 12px var(--sans);cursor:pointer;margin-top:8px;text-decoration:underline;text-underline-offset:2px}
.ask-mentor:hover{color:var(--gold)}

/* ═══ CHAPTER COMPLETE ═══ */
.ch-complete{display:none;position:fixed;inset:0;z-index:80;background:rgba(7,8,13,.94);align-items:center;justify-content:center;text-align:center;padding:20px}
.ch-complete.active{display:flex;animation:fadeIn .5s var(--ease)}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.ch-complete h2{font:700 28px var(--serif);color:var(--cream);margin-bottom:8px}
.ch-complete p{font:400 15px var(--sans);color:var(--jade);margin-bottom:24px}
</style>
</head>
<body>

<!-- CHAPTER SELECT -->
<div id="chapters">
  <div class="ch-header">
    <h1>bato · learning</h1>
    <p>De Excel a vender agentes IA</p>
  </div>
  <div class="ch-list" id="ch-list"></div>
</div>

<!-- STORY VIEW -->
<div id="story">
  <div class="story-hud">
    <button class="story-back" id="story-back">◂ Capítulos</button>
    <div class="story-room" id="story-room"></div>
    <div class="story-progress" id="story-prog"></div>
  </div>
  <div class="story-scroll" id="story-scroll">
    <div class="story-content" id="story-content"></div>
  </div>
</div>

<!-- CONCEPT MODAL -->
<div class="concept-modal" id="concept-modal">
  <div class="concept-card">
    <div class="concept-tag">Nuevo concepto</div>
    <h2 id="c-title"></h2>
    <div class="concept-analogy" id="c-analogy"></div>
    <pre class="concept-example" id="c-example"></pre>
    <div class="concept-count" id="c-count"></div>
    <button class="btn-v" id="c-btn">Entendido</button>
  </div>
</div>

<!-- MENTOR CHAT -->
<div class="mentor-modal" id="mentor-modal">
  <div class="mentor-box">
    <div class="mentor-head">DON RAMÓN <button id="mentor-close">✕</button></div>
    <div class="mentor-msgs" id="mentor-msgs"><div class="m-msg a">¿En qué te puedo ayudar, mijo?</div></div>
    <div class="mentor-foot">
      <textarea id="mentor-in" rows="1" placeholder="Pregúntale a Don Ramón..."></textarea>
      <button id="mentor-send">→</button>
    </div>
  </div>
</div>

<!-- CHAPTER COMPLETE -->
<div class="ch-complete" id="ch-complete">
  <div>
    <h2 id="cc-title"></h2>
    <p>Capítulo completado</p>
    <button class="btn-v" id="cc-btn" style="background:var(--jade);color:#fff">Continuar</button>
  </div>
</div>

<script>window.__BL = {{ game_state_json | safe }};</script>
<script type="module">
import {ROOMS, ROOM_ORDER} from '/static/js/rpg/rpg-rooms.js';

const GS = window.__BL;
const done = new Set();
for (const r of Object.values(GS.rooms)) for (const s of (r.levels_passed||[])) done.add(s);
let xp = GS.total_xp||0;
let curRoom = null, curSlug = '', hintUsed = false, puzzleStart = 0, curLevelSlug = '';

const ROOM_BG = {
  'la-oficina':'linear-gradient(160deg,#2a1c0e 0%,#1a1208 40%,#0d0a06 100%)',
  'el-taller':'linear-gradient(160deg,#0e1a24 0%,#081218 40%,#060a0d 100%)',
  'el-laboratorio':'linear-gradient(160deg,#14102a 0%,#0c0a1a 40%,#08070d 100%)',
  'la-ciudad':'linear-gradient(160deg,#1e1210 0%,#140c0a 40%,#0d0806 100%)',
};
const ROOM_ACCENT = {'la-oficina':'#c49b2a','el-taller':'#2a8cc4','el-laboratorio':'#8a52c4','la-ciudad':'#c4522a'};
const CH_DESC = {
  'la-oficina':'Un despacho con facturas desordenadas y un viejo contador que sabe más de lo que aparenta.',
  'el-taller':'Cables organizados, monitores verdes. Aquí se construye software de verdad.',
  'el-laboratorio':'Pantallas holográficas y modelos que piensan. La IA aplicada al mundo real.',
  'la-ciudad':'Torres de servidores como rascacielos. Tu agente desplegado brilla en la cima.',
};
const CH_ICONS = {'la-oficina':'🏢','el-taller':'⚙️','el-laboratorio':'🔬','la-ciudad':'🏙️'};

// ═══ HUD helpers ═══
function recalc() {
  for (const slug of ROOM_ORDER) {
    const room = ROOMS[slug]; if (!room) continue;
    const all = room.objects.filter(o=>o.levels).flatMap(o=>o.levels);
    const d = all.filter(s=>done.has(s)).length;
    GS.rooms[slug] = GS.rooms[slug]||{unlocked:false,levels_passed:[],percent:0};
    GS.rooms[slug].percent = all.length?Math.round(d/all.length*100):0;
  }
  for (let i=1;i<ROOM_ORDER.length;i++){const p=GS.rooms[ROOM_ORDER[i-1]];if(p&&p.percent>=70) GS.rooms[ROOM_ORDER[i]].unlocked=true;}
}

// Get the flat ordered list of levels for this room
function getRoomLevels() {
  const clusters = curRoom.objects.filter(o=>o.type==='puzzle_cluster');
  const bosses = curRoom.objects.filter(o=>o.type==='boss');
  const seq = [];
  for (const c of clusters) {
    for (const s of (c.levels||[])) seq.push({slug:s, cluster:c});
  }
  for (const b of bosses) {
    for (const s of (b.levels||[])) seq.push({slug:s, cluster:b, isBoss:true});
  }
  return seq;
}

function getNextLevel() {
  const seq = getRoomLevels();
  return seq.find(l=>!done.has(l.slug));
}

// ═══ DIALOGUE SYSTEM (for NPC/door interactions only) ═══
let _dlgCleanup = null;
function playDialogue(lines) {
  // Clean up any previous dialogue listeners
  if (_dlgCleanup) { _dlgCleanup(); _dlgCleanup = null; }
  return new Promise(resolve => {
    const body = document.getElementById('dlg-body');
    const tap = document.getElementById('dlg-tap');
    if (!body || !lines.length) { resolve(); return; }
    let idx = 0, typing = false, timer = null;
    function typeLine() {
      const line = lines[idx];
      body.textContent = '';
      body.classList.add('typing');
      if (tap) tap.classList.remove('show');
      typing = true;
      let ci = 0;
      timer = setInterval(()=>{
        ci++;
        body.textContent = line.slice(0,ci);
        if (ci>=line.length){ clearInterval(timer); typing=false; body.classList.remove('typing'); if(tap)tap.classList.add('show'); }
      }, 22);
    }
    function advance() {
      if (typing) { clearInterval(timer); body.textContent=lines[idx]; typing=false; body.classList.remove('typing'); if(tap)tap.classList.add('show'); return; }
      idx++;
      if (idx<lines.length) typeLine();
      else { cleanup(); resolve(); }
    }
    function cleanup(){ document.removeEventListener('click', onClick); document.removeEventListener('keydown', onKey); _dlgCleanup = null; }
    _dlgCleanup = cleanup;
    function onClick(e){ e.stopPropagation(); advance(); }
    function onKey(e){ if(e.key==='Enter'||e.key===' '){e.preventDefault();advance();} }
    document.addEventListener('click', onClick);
    document.addEventListener('keydown', onKey);
    typeLine();
  });
}

async function submit(passed, payload) {
  const elapsed = Math.round((Date.now()-puzzleStart)/1000);
  const res = await fetch('/api/game/attempt',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({level_slug:curLevelSlug,passed,hint_used:hintUsed,payload:payload||{},duration_seconds:elapsed})});
  const data = await res.json();
  if (passed) {
    done.add(curLevelSlug);
    xp += data.xp_awarded||0;
    recalc(); updateStoryProgress();

    const mood = document.querySelector('.portrait-mood');
    if(mood) mood.textContent='😊';

  return data;
}

// ═══ PUZZLE RENDERERS ═══
function renderWidget(c,data){
  const kind=data.kind, p=data.payload||{};
  switch(kind){
    case 'order_steps': rOrder(c,p); break;
    case 'multi_choice': rChoice(c,p); break;
    case 'fill_blank': rFill(c,p); break;
    case 'tf': rTF(c,p); break;
    case 'predict': rPredict(c,p); break;
    case 'decision': rDecision(c,p); break;
    case 'code': rCode(c,p); break;
    case 'boss': rBoss(c,data); break;
    default: c.textContent='Tipo: '+kind;
  }
}

function rOrder(c,p){
  const steps=p.steps||[], correct=p.correct_order||steps.map((_,i)=>i);
  const idx=steps.map((_,i)=>i); for(let i=idx.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[idx[i],idx[j]]=[idx[j],idx[i]];}
  const ul=document.createElement('ul');ul.className='w-list';
  idx.forEach((oi,pos)=>{const li=document.createElement('li');li.className='w-step';li.draggable=true;li.dataset.i=oi;li.innerHTML=`<span class="w-step-grip">⠿</span><span class="w-step-n">${pos+1}</span><span>${esc(steps[oi])}</span>`;ul.appendChild(li);});
  c.appendChild(ul);
  let src=null;
  ul.addEventListener('dragstart',e=>{src=e.target.closest('.w-step');if(src)src.classList.add('dragging');});
  ul.addEventListener('dragend',()=>{ul.querySelectorAll('.w-step').forEach(e=>e.classList.remove('dragging','drag-over'));renum(ul);});
  ul.addEventListener('dragover',e=>{e.preventDefault();const t=e.target.closest('.w-step');if(!t||t===src)return;t.classList.add('drag-over');const r=t.getBoundingClientRect();if(e.clientY<r.top+r.height/2)ul.insertBefore(src,t);else ul.insertBefore(src,t.nextSibling);});
  ul.addEventListener('dragleave',e=>{const t=e.target.closest('.w-step');if(t)t.classList.remove('drag-over');});
  let tEl=null;
  ul.addEventListener('touchstart',e=>{const t=e.target.closest('.w-step');if(t){tEl=t;t.classList.add('dragging');}},{passive:true});
  ul.addEventListener('touchmove',e=>{if(!tEl)return;e.preventDefault();const touch=e.touches[0];for(const el of ul.querySelectorAll('.w-step')){if(el===tEl)continue;const r=el.getBoundingClientRect();if(touch.clientY>r.top&&touch.clientY<r.bottom){if(touch.clientY<r.top+r.height/2)ul.insertBefore(tEl,el);else ul.insertBefore(tEl,el.nextSibling);break;}}},{passive:false});
  ul.addEventListener('touchend',()=>{if(tEl){tEl.classList.remove('dragging');tEl=null;renum(ul);}});
  const btn=document.createElement('button');btn.className='btn-v';btn.textContent='Verificar';
  btn.onclick=()=>{const cur=[...ul.querySelectorAll('.w-step')].map(l=>+l.dataset.i);const ok=cur.every((v,i)=>v===correct[i]);submit(ok,{submitted_order:cur});if(!ok)showFb(false,'Orden incorrecto. Revisa la lógica.');btn.disabled=ok;};
  c.appendChild(btn);
}

function rChoice(c,p){
  const opts=p.options||[];let sel=null,ans=false;const L='ABCDE';
  const list=document.createElement('div');list.className='w-list';
  const cards=opts.map((o,i)=>{const d=document.createElement('button');d.className='w-choice';d.innerHTML=`<span class="w-letter">${L[i]}</span><span>${esc(o.text||o.label||'')}</span>`;d.onclick=()=>{if(ans)return;list.querySelectorAll('.w-choice').forEach(c=>c.classList.remove('sel'));d.classList.add('sel');sel=i;};list.appendChild(d);return d;});
  c.appendChild(list);
  const btn=document.createElement('button');btn.className='btn-v';btn.textContent='Verificar';
  btn.onclick=()=>{if(sel===null){showFb(false,'Selecciona una opción.');return;}if(ans)return;ans=true;const o=opts[sel];const ok=!!(o.correct||o.is_correct);cards.forEach((cd,i)=>{if(opts[i].correct||opts[i].is_correct)cd.classList.add('ok');});if(!ok)cards[sel].classList.add('no');submit(ok,{selected_index:sel});if(!ok)showFb(false,o.feedback||'Incorrecto.');btn.disabled=true;};
  c.appendChild(btn);
}

function rFill(c,p){
  const tmpl=p.code_template||'',blanks=p.blanks||[];
  const code=document.createElement('div');code.className='w-code';code.style.whiteSpace='pre-wrap';
  const inputs=[];let bi=0;
  tmpl.split('___').forEach((part,i)=>{code.appendChild(document.createTextNode(part));if(i<tmpl.split('___').length-1){const inp=document.createElement('input');inp.type='text';inp.className='w-blank';inp.placeholder=blanks[bi]?.label||'...';inp.size=Math.max(6,(blanks[bi]?.label||'').length);inputs.push(inp);code.appendChild(inp);bi++;}});
  c.appendChild(code);
  const btn=document.createElement('button');btn.className='btn-v';btn.textContent='Verificar';
  btn.onclick=()=>{let ok=true;inputs.forEach((inp,i)=>{const v=inp.value.trim();const m=blanks[i]?.correct?.map(c=>c.trim()).includes(v);inp.classList.toggle('ok',m);inp.classList.toggle('no',!m);if(!m)ok=false;});submit(ok,{answers:inputs.map(i=>i.value.trim())});if(!ok)showFb(false,'Algún espacio no es correcto.');btn.disabled=ok;};
  c.appendChild(btn);
}

function rTF(c,p){
  const stmt=p.statement||'',correct=p.correct;
  if(stmt){const s=document.createElement('p');s.style.cssText='font:400 14px/1.6 var(--sans);color:var(--cream-d);margin-bottom:10px;';s.textContent=stmt;c.appendChild(s);}
  const row=document.createElement('div');row.className='w-tf';let ans=false;
  ['Verdadero','Falso'].forEach((l,i)=>{const b=document.createElement('button');b.textContent=l;b.onclick=()=>{if(ans)return;ans=true;const v=i===0;const ok=v===correct;b.classList.add(ok?'ok':'no');row.querySelectorAll('button').forEach((bb,j)=>{if((j===0)===correct)bb.classList.add('ok');});submit(ok,{selected:v});};row.appendChild(b);});
  c.appendChild(row);
}

function rPredict(c,p){
  const code=p.code||'',exp=(p.expected_output||'').trim();
  const pre=document.createElement('pre');pre.className='w-code';pre.textContent=code;c.appendChild(pre);
  const inp=document.createElement('textarea');inp.className='w-input';inp.placeholder='Escribe la salida exacta...';inp.rows=3;c.appendChild(inp);
  const btn=document.createElement('button');btn.className='btn-v';btn.textContent='Verificar';
  btn.onclick=()=>{const ok=inp.value.trim()===exp;submit(ok,{answer:inp.value.trim()});if(!ok)showFb(false,`Esperado: "${exp}"`);btn.disabled=true;};
  c.appendChild(btn);
}

function rDecision(c,p){
  const opts=p.options||[];
  if(p.prompt_md){const pr=document.createElement('div');pr.className='puzzle-scenario';pr.style.marginBottom='12px';pr.textContent=p.prompt_md;c.appendChild(pr);}
  const list=document.createElement('div');list.className='w-list';
  opts.forEach((o,i)=>{const d=document.createElement('button');d.className='w-choice';d.innerHTML=`<span class="w-letter">${i+1}</span><div><strong>${esc(o.label||'')}</strong><br><small style="color:var(--cream-d)">${esc(o.tradeoff_md||o.tradeoff||'')}</small></div>`;d.onclick=()=>{submit(true,{chosen_index:i});};list.appendChild(d);});
  c.appendChild(list);
}

function rCode(c,p){
  const starter=p.starter||'',tests=p.tests||'';
  const ta=document.createElement('textarea');ta.className='w-editor';ta.value=starter;ta.spellcheck=false;
  ta.addEventListener('keydown',e=>{if(e.key==='Tab'){e.preventDefault();const s=ta.selectionStart;ta.value=ta.value.substring(0,s)+'    '+ta.value.substring(ta.selectionEnd);ta.selectionStart=ta.selectionEnd=s+4;}});
  c.appendChild(ta);
  const out=document.createElement('div');out.className='w-output';c.appendChild(out);
  const btn=document.createElement('button');btn.className='btn-v';btn.textContent='Verificar';
  btn.onclick=async()=>{
    btn.disabled=true;out.textContent='Ejecutando...';out.className='w-output vis';
    try{
      if(!window.loadPyodide)throw new Error('Pyodide no disponible');
      const py=await window.loadPyodide();let output='';
      py.setStdout({batched:s=>{output+=s+'\n';}});py.setStderr({batched:s=>{output+=s+'\n';}});
      await py.runPythonAsync(ta.value+'\n\n'+tests);
      out.textContent=output||'✓ Tests OK';out.className='w-output vis';
      submit(true,{code:ta.value});
    }catch(err){out.textContent=err.message;out.className='w-output vis err';showFb(false,'Errores en el código.');btn.disabled=false;}
  };
  c.appendChild(btn);
}

function rBoss(c,data){
  const steps=data.payload?.steps||[];let ci=0;
  function showStep(i){
    c.innerHTML='';
    const s=steps[i];
    if(s.title){const h=document.createElement('div');h.style.cssText='font:700 13px var(--serif);color:var(--cream);margin-bottom:8px;';h.textContent=`Paso ${i+1}/${steps.length}: ${s.title}`;c.appendChild(h);}
    if(s.scenario_md){const p=document.createElement('p');p.style.cssText='font:400 13px var(--sans);color:var(--cream-d);margin-bottom:12px;';p.textContent=s.scenario_md;c.appendChild(p);}
    const sub=document.createElement('div');
    renderWidget(sub,{kind:s.kind||'multi_choice',payload:s,hint_md:s.hint_md});
    c.appendChild(sub);
    // Override submit for sub-steps
    const origSubmit = window._bossSubSubmit;
  }
  showStep(0);
}

// ═══ MENTOR CHAT ═══
document.getElementById('mentor-close').onclick=()=>document.getElementById('mentor-modal').classList.remove('active');
document.getElementById('mentor-send').onclick=sendChat;
document.getElementById('mentor-in').addEventListener('keydown',e=>{if((e.ctrlKey||e.metaKey)&&e.key==='Enter')sendChat();});
async function sendChat(){
  const inp=document.getElementById('mentor-in');const msg=inp.value.trim();if(!msg)return;inp.value='';
  const msgs=document.getElementById('mentor-msgs');
  msgs.innerHTML+=`<div class="m-msg u">${esc(msg)}</div>`;
  const bot=document.createElement('div');bot.className='m-msg a';bot.textContent='...';msgs.appendChild(bot);msgs.scrollTop=msgs.scrollHeight;
  try{
    const res=await fetch('/api/game/chat',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({message:msg,level_slug:curLevelSlug||null,context:curSlug?`Sala: ${curSlug}`:''})});
    bot.textContent='';const reader=res.body.getReader();const dec=new TextDecoder();let buf='';
    while(true){const{done:d,value}=await reader.read();if(d)break;buf+=dec.decode(value,{stream:true});const lines=buf.split('\n');buf=lines.pop();let evt='';
    for(const line of lines){if(line.startsWith('event: '))evt=line.slice(7).trim();else if(line.startsWith('data: ')){const raw=line.slice(6).trim();if(raw==='[DONE]')break;try{const obj=JSON.parse(raw);if(evt==='delta'&&obj.text)bot.textContent+=obj.text;}catch{}}}
    msgs.scrollTop=msgs.scrollHeight;}
  }catch{bot.textContent='Don Ramón no está disponible ahora.';}
}

function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function renum(ul){ul.querySelectorAll('.w-step-n').forEach((e,i)=>e.textContent=i+1);}

// Auto-enter the first incomplete chapter — zero friction
const autoSlug = ROOM_ORDER.find(s=>GS.rooms[s]?.unlocked&&(GS.rooms[s]?.percent||0)<100);
if (autoSlug) enterStory(autoSlug);
