{% set meta = q.meta_json | fromjson %}
{% set bonus_ms = meta.get("bonus_window_ms", 5000) %}
<article class="quiz tf" data-quiz-id="{{ q.id }}" data-slug="{{ q.slug }}"
         data-kind="tf" data-bonus-ms="{{ bonus_ms }}">
  <div class="q">{{ q.question_md | md | safe }}</div>
  <div class="tf-countdown">
    <span class="countdown-label">Responde en</span>
    <span class="countdown-value">5</span>
    <span class="countdown-label">s para bonus XP</span>
  </div>
  <div class="opts tf-opts">
    {% for opt in q.options %}
      <button type="button" class="opt tf-opt" data-option-id="{{ opt.id }}">
        {{ opt.text_md }}
      </button>
    {% endfor %}
  </div>
  <div class="feedback" hidden></div>
  {% if q.explanation_md %}
    <div class="explanation" hidden>{{ q.explanation_md | md | safe }}</div>
  {% endif %}
</article>
