{% set xp_reward = 50 if module.track == "0" else 25 %}
<article class="exercise" data-exercise-id="{{ ex.id }}" data-slug="{{ ex.slug }}" data-runner="{{ ex.runner }}" data-xp="{{ xp_reward }}">
  <header class="ex-header">
    <span class="badge">EJ {{ ex.ord }}</span>
    <h4>{{ ex.title }}</h4>
    <span class="xp-reward" title="XP que ganas al pasarlo">+{{ xp_reward }} XP</span>
  </header>

  <div class="ex-prompt">{{ ex.prompt_md | md | safe }}</div>

  {% if ex.hint_md %}
    <details class="ex-hint"><summary>pista</summary>{{ ex.hint_md | md | safe }}</details>
  {% endif %}

  <textarea class="code-editor" spellcheck="false" data-initial>{{ ex.starter_code }}</textarea>

  <div class="ex-controls">
    <button type="button" class="run-ex">Ejecutar</button>
    <button type="button" class="show-sol">Ver solución</button>
    <button type="button" class="reset-ex">Reset</button>
    <span class="runner-tag">runner: {{ ex.runner }}</span>
  </div>

  <pre class="output"></pre>

  <pre class="test-code" hidden>{{ ex.test_code }}</pre>
  <pre class="solution" hidden>{{ ex.solution_code }}</pre>
</article>
