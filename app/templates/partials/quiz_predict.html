{% set meta = q.meta_json | fromjson %}
<article class="quiz predict" data-quiz-id="{{ q.id }}" data-slug="{{ q.slug }}" data-kind="predict">
  <div class="q">{{ q.question_md | md | safe }}</div>
  {% if meta.get("code") %}
  <pre class="predict-code"><code>{{ meta.code }}</code></pre>
  {% endif %}
  <label class="predict-label">¿Qué imprime este código?</label>
  <textarea class="predict-input" rows="2" placeholder="Escribe la salida esperada…"></textarea>
  <div class="predict-actions">
    <button type="button" class="reveal-btn btn-secondary">Revelar respuesta</button>
  </div>
  <div class="feedback" hidden></div>
  {% if q.explanation_md %}
    <div class="explanation" hidden>{{ q.explanation_md | md | safe }}</div>
  {% endif %}
</article>
